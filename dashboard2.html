<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteMind Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}
.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}
input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  background: #334155;
  border: none;
  border-radius: 6px;
  color: white;
  box-sizing: border-box;
}
button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.btn-primary { background: #2563eb; color: white; }
.btn-danger { background: #ef4444; color: white; }
.btn-copy { background: #10b981; color: white; }
.agent-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.small { font-size: 12px; opacity: 0.6; }
</style>
</head>

<body>

<div class="container">
  <h1>🚀 SiteMind Dashboard</h1>

  <div class="card">
    <h3>Create Agent</h3>
    <input id="name" placeholder="Agent name">
    <input id="domain" placeholder="https://example.com">
    <input id="color" placeholder="#2563eb">
    <textarea id="welcome" placeholder="Welcome message"></textarea>
    <button class="btn-primary" onclick="createAgent()">Create</button>
  </div>

  <div id="agents"></div>
</div>

<script>
const API = "https://ai-tutor-rouge-theta.vercel.app/api";

async function loadAgents() {
  const res = await fetch(API + "/get-agents");
  const data = await res.json();

  const container = document.getElementById("agents");
  container.innerHTML = "";

  data.forEach(agent => {
    const div = document.createElement("div");
    div.className = "card";

    const title = document.createElement("h3");
    title.textContent = agent.agent_name || "";

    const small = document.createElement("div");
    small.className = "small";
    small.textContent = agent.site_domain || "";

    const nameInput = document.createElement("input");
    nameInput.id = "name-" + agent.agent_id;
    nameInput.value = agent.agent_name || "";

    const welcomeTextarea = document.createElement("textarea");
    welcomeTextarea.id = "welcome-" + agent.agent_id;
    welcomeTextarea.value = agent.welcome_message || "";

    const colorInput = document.createElement("input");
    colorInput.id = "color-" + agent.agent_id;
    colorInput.value = agent.theme_color || "";

    const promptTextarea = document.createElement("textarea");
    promptTextarea.id = "prompt-" + agent.agent_id;
    promptTextarea.placeholder = "System prompt";
    promptTextarea.value = agent.system_prompt || "";

    const actions = document.createElement("div");
    actions.className = "agent-actions";

    const saveBtn = document.createElement("button");
    saveBtn.className = "btn-primary";
    saveBtn.textContent = "Save";
    saveBtn.onclick = function () {
      updateAgent(agent.agent_id);
    };

    const deleteBtn = document.createElement("button");
    deleteBtn.className = "btn-danger";
    deleteBtn.textContent = "Delete";
    deleteBtn.onclick = function () {
      deleteAgent(agent.agent_id);
    };

    const copyBtn = document.createElement("button");
    copyBtn.className = "btn-copy";
    copyBtn.textContent = "Copy Embed";
    copyBtn.onclick = function () {
      copyEmbed(agent.agent_id);
    };

    const crawlBtn = document.createElement("button");
    crawlBtn.className = "btn-primary";
    crawlBtn.textContent = "Crawl";
    crawlBtn.onclick = function () {
      crawlSite(agent.agent_id, agent.site_domain || "");
    };

    actions.appendChild(saveBtn);
    actions.appendChild(deleteBtn);
    actions.appendChild(copyBtn);
    actions.appendChild(crawlBtn);

    div.appendChild(title);
    div.appendChild(small);
    div.appendChild(nameInput);
    div.appendChild(welcomeTextarea);
    div.appendChild(colorInput);
    div.appendChild(promptTextarea);
    div.appendChild(actions);

    container.appendChild(div);
  });
}

async function createAgent() {
  const name = document.getElementById("name").value;
  const domain = document.getElementById("domain").value;
  const color = document.getElementById("color").value;
  const welcome = document.getElementById("welcome").value;

  await fetch(API + "/create-agent", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      agent_name: name,
      site_domain: domain,
      theme_color: color,
      welcome_message: welcome
    })
  });

  loadAgents();
}

async function updateAgent(id) {
  const name = document.getElementById("name-" + id).value;
  const welcome = document.getElementById("welcome-" + id).value;
  const color = document.getElementById("color-" + id).value;
  const prompt = document.getElementById("prompt-" + id).value;

  await fetch(API + "/update-agent", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      agent_id: id,
      agent_name: name,
      welcome_message: welcome,
      theme_color: color,
      system_prompt: prompt
    })
  });

  alert("Saved");
}

async function deleteAgent(id) {
  if (!confirm("Delete agent?")) return;

  await fetch(API + "/delete-agent", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ agent_id: id })
  });

  loadAgents();
}

function copyEmbed(id) {
  const code = '<' + 'script src="https://ai-tutor-rouge-theta.vercel.app/sitemind-embed.js" data-agent-id="' + id + '"></' + 'script>';
  navigator.clipboard.writeText(code);
  alert("Copied!");
}

async function crawlSite(agentId, defaultUrl) {
  const url = prompt("Enter URL to crawl:", defaultUrl || "");
  if (!url) return;

  try {
    const res = await fetch(API + "/crawl", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        url: url,
        agent_id: agentId
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert("Crawl error: " + (data.error || "Unknown error"));
      return;
    }

    alert("Crawl success. Saved content length: " + data.content_length);
  } catch (err) {
    alert("Crawl failed: " + err.message);
  }
}

loadAgents();
</script>

</body>
</html>
