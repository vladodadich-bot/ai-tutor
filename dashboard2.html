<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteMind Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}
.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}
input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  background: #334155;
  border: none;
  border-radius: 6px;
  color: white;
}
button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.btn-primary { background: #2563eb; color: white; }
.btn-danger { background: #ef4444; color: white; }
.btn-copy { background: #10b981; color: white; }
.agent-actions { display: flex; gap: 10px; }
.small { font-size: 12px; opacity: 0.6; }
</style>
</head>

<body>

<div class="container">
  <h1>🚀 SiteMind Dashboard</h1>

  <div class="card">
    <h3>Create Agent</h3>
    <input id="name" placeholder="Agent name">
    <input id="domain" placeholder="https://example.com">
    <input id="color" placeholder="#2563eb">
    <textarea id="welcome" placeholder="Welcome message"></textarea>
    <button class="btn-primary" onclick="createAgent()">Create</button>
  </div>

  <div id="agents"></div>
</div>

<script>
const API = "https://ai-tutor-rouge-theta.vercel.app/api";

async function loadAgents() {
  const res = await fetch(API + "/get-agents");
  const data = await res.json();

  const container = document.getElementById("agents");
  container.innerHTML = "";

  data.forEach(agent => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML =
      '<h3>' + agent.agent_name + '</h3>' +
      '<div class="small">' + agent.site_domain + '</div>' +

      '<input value="' + (agent.agent_name || '') + '" id="name-' + agent.agent_id + '">' +
      '<textarea id="welcome-' + agent.agent_id + '">' + (agent.welcome_message || '') + '</textarea>' +
      '<input value="' + (agent.theme_color || '') + '" id="color-' + agent.agent_id + '">' +

      '<textarea id="prompt-' + agent.agent_id + '">' + (agent.system_prompt || '') + '</textarea>' +

      '<div class="agent-actions">' +
        '<button class="btn-primary" onclick="updateAgent(\'' + agent.agent_id + '\')">Save</button>' +
        '<button class="btn-danger" onclick="deleteAgent(\'' + agent.agent_id + '\')">Delete</button>' +
        '<button class="btn-copy" onclick="copyEmbed(\'' + agent.agent_id + '\')">Copy Embed</button>' +
      '</div>';

    container.appendChild(div);
  });
}

async function createAgent() {
  const name = document.getElementById("name").value;
  const domain = document.getElementById("domain").value;
  const color = document.getElementById("color").value;
  const welcome = document.getElementById("welcome").value;

  await fetch(API + "/create-agent", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      agent_name: name,
      site_domain: domain,
      theme_color: color,
      welcome_message: welcome
    })
  });

  loadAgents();
}

async function updateAgent(id) {
  const name = document.getElementById("name-"+id).value;
  const welcome = document.getElementById("welcome-"+id).value;
  const color = document.getElementById("color-"+id).value;
  const prompt = document.getElementById("prompt-"+id).value;

  await fetch(API + "/update-agent", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      agent_id: id,
      agent_name: name,
      welcome_message: welcome,
      theme_color: color,
      system_prompt: prompt
    })
  });

  alert("Saved");
}

async function deleteAgent(id) {
  if (!confirm("Delete agent?")) return;

  await fetch(API + "/delete-agent", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ agent_id: id })
  });

  loadAgents();
}

function copyEmbed(id) {
  const code = '<script src="https://ai-tutor-rouge-theta.vercel.app/sitemind-embed.js" data-agent-id="' + id + '"></script>';
  navigator.clipboard.writeText(code);
  alert("Copied!");
}

loadAgents();
</script>

</body>
</html>
