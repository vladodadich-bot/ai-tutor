<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteMind AI</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-1: #f6f8fb;
      --bg-2: #f1f5f9;
      --bg-3: #e8edf4;
      --panel: rgba(255,255,255,0.98);
      --panel-strong: rgba(255,255,255,1);
      --text: #10263e;
      --muted: #5f7388;
      --muted-2: #879bb0;

      --header-grad-1: #06172b;
      --header-grad-2: #081F39;
      --header-grad-3: #103357;

      --accent: #081F39;
      --accent-2: #103357;
      --user-grad-1: #081F39;
      --user-grad-2: #103357;
      --assistant-bg: #ffffff;

      --border: rgba(8, 31, 57, 0.10);
      --border-strong: rgba(8, 31, 57, 0.18);

      --header-text: #ffffff;
      --header-subtext: rgba(255,255,255,0.92);
      --header-brand-text: rgba(255,255,255,0.88);

      --header-close-border: rgba(255,255,255,0.18);
      --header-close-bg-1: rgba(255,255,255,0.16);
      --header-close-bg-2: rgba(255,255,255,0.06);
      --header-close-hover-bg-1: rgba(255,255,255,0.24);
      --header-close-hover-bg-2: rgba(255,255,255,0.10);
      --header-close-hover-border: rgba(255,255,255,0.28);

      --send-text: #ffffff;

      --surface-derived-1: #f6f8fb;
      --surface-derived-2: #f1f5f9;
      --surface-derived-3: #e8edf4;
      --surface-input: #f8fafc;
      --surface-input-border: rgba(8, 31, 57, 0.14);

      --shadow-md: 0 10px 24px rgba(8, 31, 57, 0.08);
      --shadow-lg: 0 14px 34px rgba(8, 31, 57, 0.10);
      --glow: 0 0 0 1px rgba(8,31,57,0.12), 0 0 20px rgba(16,51,87,0.10);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, var(--surface-derived-1) 0%, var(--surface-derived-2) 56%, var(--surface-derived-3) 100%);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .chat-shell {
      position: relative;
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.70)),
        linear-gradient(180deg, var(--surface-derived-1) 0%, var(--surface-derived-2) 54%, var(--surface-derived-3) 100%);
    }

    .chat-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at top right, rgba(16,51,87,0.05), transparent 24%),
        radial-gradient(circle at bottom left, rgba(8,31,57,0.04), transparent 30%);
    }

    .chat-header {
      position: relative;
      z-index: 1;
      padding: 14px 18px 16px;
      color: var(--header-text);
      background:
        radial-gradient(circle at 50% 38%, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.03) 24%, transparent 48%),
        linear-gradient(180deg, #06172b 0%, #081F39 40%, #103357 58%, #081F39 78%, #06172b 100%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.14);
      box-shadow:
        0 12px 28px rgba(8, 31, 57, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.10);
      overflow: hidden;
    }

    .chat-header::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.02) 36%, transparent 100%);
      mix-blend-mode: screen;
    }

    .chat-header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .chat-header-left {
      min-width: 0;
      flex: 1;
    }

    .sm-header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .sm-title-wrap {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .sm-logo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      min-width: 52px;
      border-radius: 14px;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      background:
        radial-gradient(circle at 24% 20%, rgba(255,255,255,0.16), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03)),
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 8px 20px rgba(0,0,0,0.18);
      flex-shrink: 0;
      backdrop-filter: blur(10px);
    }

    .brand-link::after {
      content: "";
      position: absolute;
      top: -35%;
      left: -60%;
      width: 42%;
      height: 180%;
      background: linear-gradient(
        115deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.06) 28%,
        rgba(255,255,255,0.22) 50%,
        rgba(255,255,255,0.08) 72%,
        rgba(255,255,255,0) 100%
      );
      transform: skewX(-24deg);
      animation: shineSweep 5.8s ease-in-out infinite;
      pointer-events: none;
      z-index: 2;
    }

    .sm-logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
      display: block;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.12));
    }

    .brand-link {
      display: inline-flex;
      align-items: center;
      margin: 0 0 7px;
      padding: 6px 10px;
      font-size: 10px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.35px;
      color: rgba(255,255,255,0.92);
      text-decoration: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.10),
        0 6px 16px rgba(0,0,0,0.10);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .chat-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.2px;
      padding-right: 6px;
      word-break: break-word;
      color: var(--header-text);
      text-shadow: 0 1px 1px rgba(0,0,0,0.10);
    }

    .chat-subtitle {
      font-size: 12px;
      color: var(--header-subtext);
      line-height: 1.45;
      max-width: 96%;
      position: relative;
      z-index: 1;
      text-shadow: 0 1px 1px rgba(0,0,0,0.08);
    }

    .chat-close {
      border: 1px solid var(--header-close-border);
      background: linear-gradient(180deg, var(--header-close-bg-1), var(--header-close-bg-2));
      color: var(--header-text);
      width: 34px;
      height: 34px;
      min-width: 34px;
      padding: 0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 20px;
      line-height: 34px;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 8px 18px rgba(0,0,0,0.12),
        inset 0 1px 0 rgba(255,255,255,0.14);
      transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 1;
    }

    .chat-close:hover {
      background: linear-gradient(180deg, var(--header-close-hover-bg-1), var(--header-close-hover-bg-2));
      border-color: var(--header-close-hover-border);
      transform: translateY(-1px);
    }

    .chat-messages {
      position: relative;
      z-index: 1;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 18px 14px 12px;
      background: transparent;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 8px; }
    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.32);
      border-radius: 999px;
    }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }

    .message-row {
      display: flex;
      margin-bottom: 14px;
    }

    .message-row.user { justify-content: flex-end; }
    .message-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 88%;
      padding: 13px 15px;
      border-radius: 18px;
      font-size: 16px;
      line-height: 1.7;
      word-wrap: break-word;
      white-space: pre-wrap;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }

    .message-row.user .bubble {
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.14), transparent 24%),
        linear-gradient(180deg, #06172b 0%, #081F39 46%, #103357 100%);
      color: #ffffff;
      font-weight: 600;
      border-bottom-right-radius: 6px;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow:
        0 10px 24px rgba(8, 31, 57, 0.20),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .message-row.assistant .bubble {
      background: linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(255,255,255,0.88) 100%);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
      box-shadow: var(--shadow-lg);
    }

    .bubble a {
      color: var(--accent);
      text-decoration: underline;
      font-weight: 600;
      word-break: break-word;
    }

    .message-row.user .bubble a { color: #ffffff; }

    .chat-status {
      position: relative;
      z-index: 1;
      min-height: 24px;
      padding: 0 16px 10px;
      font-size: 12px;
      color: var(--muted);
      background: transparent;
      flex-shrink: 0;
    }

    .chat-form {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.60)),
        linear-gradient(180deg, var(--surface-derived-1) 0%, var(--surface-derived-2) 100%);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      box-shadow: 0 -8px 24px rgba(15, 23, 42, 0.05);
    }

    .chat-input {
      flex: 1;
      resize: none;
      min-height: 48px;
      max-height: 120px;
      padding: 12px 14px;
      border: 1px solid var(--surface-input-border);
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.6;
      font-family: Arial, sans-serif;
      font-weight: 500;
      outline: none;
      background: var(--surface-input);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .chat-input::placeholder { color: var(--muted-2); }

    .chat-input:focus {
      border-color: rgba(8,31,57,0.24);
      box-shadow: var(--glow);
      background: rgba(255,255,255,0.92);
    }

    .chat-send {
      border: 0;
      border-radius: 16px;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.03) 24%, transparent 48%),
        linear-gradient(180deg, #06172b 0%, #081F39 40%, #103357 56%, #081F39 76%, #06172b 100%);
      color: var(--send-text);
      padding: 0 18px;
      font-size: 14px;
      font-weight: 800;
      min-width: 96px;
      height: 48px;
      cursor: pointer;
      box-shadow:
        0 12px 24px rgba(8,31,57,0.20),
        inset 0 1px 0 rgba(255,255,255,0.08);
      transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
      white-space: nowrap;
    }

    .chat-send:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .chat-send:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    @keyframes shineSweep {
      0% { left: -65%; opacity: 0; }
      10% { opacity: 0; }
      20% { opacity: 1; }
      32% { left: 130%; opacity: 0; }
      100% { left: 130%; opacity: 0; }
    }

    @media (min-width: 480px) {
      .chat-shell { border-left: 1px solid rgba(0,0,0,0.04); }
      .chat-header { padding: 16px 20px 18px; }
      .chat-title { font-size: 17px; }
      .chat-messages { padding: 20px 16px 12px; }
      .bubble { max-width: 84%; }
      .chat-form { padding: 14px; }
    }

    @media (max-width: 480px) {
      .sm-logo-link { width: 48px; height: 48px; min-width: 48px; }
      .sm-logo { width: 36px; height: 36px; }
      .sm-header-brand { gap: 10px; }
      .chat-header { padding: 14px; }
      .chat-messages { padding: 14px 12px 10px; }
      .bubble { max-width: 90%; font-size: 15px; }
      .chat-form { padding: 10px; gap: 8px; }
      .chat-send { min-width: 82px; padding: 0 14px; }
      .chat-close { width: 32px; height: 32px; min-width: 32px; }
      .chat-input { font-size: 15px; }
    }
  </style>
</head>
<body>
<div class="chat-shell" id="chatShell">
  <div class="chat-header" id="chatHeader">
    <div class="chat-header-top">
      <div class="chat-header-left">
        <div class="sm-header-brand">
          <a
            class="sm-logo-link"
            id="smLogoLink"
            href="https://sitemindai.app"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open SiteMind Ai Labs"
          >
            <img
              class="sm-logo"
              id="smLogo"
              src="https://sitemindai.app/images/logo7.png"
              alt="SiteMind Ai Labs logo"
            />
          </a>

          <div class="sm-title-wrap">
            <a class="brand-link" href="https://sitemindai.app" target="_blank" rel="noopener noreferrer">Powered by SiteMind Ai Labs</a>
            <div class="chat-title" id="chatTitle">SiteMind AI</div>
          </div>
        </div>
      </div>

      <button type="button" class="chat-close" id="chatClose" aria-label="Close chat">×</button>
    </div>

    <div class="chat-subtitle" id="chatSubtitle">Ask AI Agent</div>
  </div>

  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-status" id="chatStatus"></div>

  <form class="chat-form" id="chatForm">
    <textarea
      id="chatInput"
      class="chat-input"
      placeholder="Type a question..."
      rows="1"
    ></textarea>
    <button type="submit" id="chatSend" class="chat-send">Send</button>
  </form>
</div>

<script>
(function () {
  "use strict";

  var API_BASE = "https://ai-tutor-rouge-theta.vercel.app/api/index";
  var REQUEST_TIMEOUT = 30000;
  var MAX_HISTORY_ITEMS = 10;
  var HISTORY_EXPIRY_MS = 45 * 60 * 1000;

  var chatShell = document.getElementById("chatShell");
  var chatForm = document.getElementById("chatForm");
  var chatInput = document.getElementById("chatInput");
  var chatSend = document.getElementById("chatSend");
  var chatMessages = document.getElementById("chatMessages");
  var chatStatus = document.getElementById("chatStatus");
  var chatTitle = document.getElementById("chatTitle");
  var chatSubtitle = document.getElementById("chatSubtitle");
  var chatClose = document.getElementById("chatClose");

  var params = new URLSearchParams(window.location.search);
  var agentId = params.get("agentId") || "demo-agent";

  function normalizeLang(value) {
    var lang = String(value || "").toLowerCase().trim();
    if (!lang) return "en";
    if (lang.indexOf("hr") === 0 || lang.indexOf("bs") === 0 || lang.indexOf("sr") === 0) return "hr";
    if (lang.indexOf("de") === 0) return "de";
    if (lang.indexOf("it") === 0) return "it";
    if (lang.indexOf("fr") === 0) return "fr";
    if (lang.indexOf("en") === 0) return "en";
    return "en";
  }

  function cleanText(value) {
    return String(value || "")
      .replace(/\u00A0/g, " ")
      .replace(/\s+/g, " ")
      .replace(/\((https?:\/\/[^\s)]+)\)/g, "$1")
      .replace(/(https?:\/\/[^\s)]+)\)/g, "$1")
      .trim();
  }

  function truncateText(value, max) {
    var text = cleanText(value);
    if (text.length <= max) return text;
    return text.slice(0, max);
  }

  var initialLang = normalizeLang(
    params.get("lang") ||
    document.documentElement.getAttribute("lang") ||
    (navigator.language || navigator.userLanguage || "en")
  );

  var pageData = {
    pageTitle: "",
    pageDescription: "",
    pageUrl: "",
    pageContext: "",
    pageText: "",
    h1: "",
    headings: [],
    language: initialLang,
    pageTypeHint: "general"
  };

  var agentData = {
    agentId: agentId,
    agentName: "SiteMind AI",
    welcomeMessage: "",
    themeColor: "#081F39"
  };

  var isSending = false;
  var activeController = null;

  var UI_TEXT = {
    hr: {
      subtitleDefault: "Pitaj AI asistenta",
      inputPlaceholder: "Napiši pitanje...",
      send: "Pošalji",
      sending: "...",
      loading: "Samo trenutak...",
      streaming: "AI odgovara...",
      errorGeneric: "Došlo je do greške. Pokušaj ponovo.",
      errorTimeout: "Zahtjev je trajao predugo. Pokušaj kraće pitanje.",
      welcome: "Pozdrav! Mogu pomoći sa sadržajem ove stranice, uslugama, proizvodima ili općim pitanjima.",
      askPage: "Pitaj AI o: ",
      closeAria: "Zatvori chat"
    },
    de: {
      subtitleDefault: "Frag den KI-Assistenten",
      inputPlaceholder: "Schreibe eine Frage...",
      send: "Senden",
      sending: "...",
      loading: "Einen Moment...",
      streaming: "KI antwortet...",
      errorGeneric: "Etwas ist schiefgelaufen. Bitte versuche es erneut.",
      errorTimeout: "Die Anfrage hat zu lange gedauert. Versuche eine kürzere Frage.",
      welcome: "Hallo! Ich kann dir mit dem Inhalt dieser Seite, Services, Produkten oder allgemeinen Fragen helfen.",
      askPage: "Frage die KI zu: ",
      closeAria: "Chat schließen"
    },
    it: {
      subtitleDefault: "Chiedi all'assistente AI",
      inputPlaceholder: "Scrivi una domanda...",
      send: "Invia",
      sending: "...",
      loading: "Un momento...",
      streaming: "L'AI sta rispondendo...",
      errorGeneric: "Si è verificato un errore. Riprova.",
      errorTimeout: "La richiesta ha richiesto troppo tempo. Prova con una domanda più breve.",
      welcome: "Ciao! Posso aiutarti con il contenuto di questa pagina, servizi, prodotti o domande generali.",
      askPage: "Chiedi all'AI di: ",
      closeAria: "Chiudi chat"
    },
    fr: {
      subtitleDefault: "Demandez à l’assistant IA",
      inputPlaceholder: "Écrivez une question...",
      send: "Envoyer",
      sending: "...",
      loading: "Un instant...",
      streaming: "L’IA répond...",
      errorGeneric: "Une erreur s’est produite. Veuillez réessayer.",
      errorTimeout: "La requête a pris trop de temps. Essayez une question plus courte.",
      welcome: "Bonjour ! Je peux vous aider avec le contenu de cette page, les services, les produits ou des questions générales.",
      askPage: "Demandez à l’IA à propos de : ",
      closeAria: "Fermer le chat"
    },
    en: {
      subtitleDefault: "Ask AI Agent",
      inputPlaceholder: "Type a question...",
      send: "Send",
      sending: "...",
      loading: "One moment...",
      streaming: "AI is replying...",
      errorGeneric: "Something went wrong. Please try again.",
      errorTimeout: "The request took too long. Try a shorter question.",
      welcome: "Hello! I can help with this page, services, products, or general questions.",
      askPage: "Ask AI about: ",
      closeAria: "Close chat"
    }
  };

  function getLang() {
    return normalizeLang(
      pageData.language ||
      params.get("lang") ||
      document.documentElement.getAttribute("lang") ||
      (navigator.language || navigator.userLanguage || "en")
    );
  }

  function t(key) {
    var lang = getLang();
    return (UI_TEXT[lang] && UI_TEXT[lang][key]) || UI_TEXT.en[key] || "";
  }

  function getLocalizedWelcomeMessage() {
    var lang = getLang();
    if (agentData.welcomeMessage && typeof agentData.welcomeMessage === "object") {
      return agentData.welcomeMessage[lang] || agentData.welcomeMessage.en || t("welcome");
    }
    if (typeof agentData.welcomeMessage === "string" && cleanText(agentData.welcomeMessage)) {
      return cleanText(agentData.welcomeMessage);
    }
    return t("welcome");
  }

  function getHistoryPayloadKey() {
    return "sitemind_history_payload_" + agentId;
  }

  function escapeHtml(str) {
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function normalizeResponseText(text) {
    return String(text || "")
      .replace(/\r\n/g, "\n")
      .replace(/^\s{0,3}#{1,6}\s*/gm, "")
      .replace(/\*\*(.*?)\*\*/g, "$1")
      .replace(/__(.*?)__/g, "$1")
      .replace(/^[ \t]*[-*•]\s+/gm, "")
      .replace(/\n{3,}/g, "\n\n")
      .trim();
  }

  function formatMessageHtml(text) {
    var safeText = normalizeResponseText(text);

    var escaped = escapeHtml(safeText)
      .replace(/\n\n+/g, "<br><br>")
      .replace(/\n/g, "<br>");

    return escaped.replace(
      /(https?:\/\/[^\s<>()]+)/g,
      function (url) {
        var cleanUrl = url.replace(/&lt;br&gt;$/, "");
        return '<a href="' + cleanUrl + '" target="_blank" rel="noopener noreferrer">' + cleanUrl + "</a>";
      }
    );
  }

  function notifyParentClose() {
    if (window.parent && window.parent !== window) {
      try {
        window.parent.postMessage({ type: "sitemind-close-widget", agentId: agentId }, "*");
      } catch (e) {}
    }
  }

  function requestPageContextRefresh() {
    if (window.parent && window.parent !== window) {
      try {
        window.parent.postMessage({ type: "sitemind-refresh-page-context", agentId: agentId }, "*");
      } catch (e) {}
    }
  }

  function setStatus(text) {
    chatStatus.textContent = text || "";
  }

  function autoResizeTextarea() {
    chatInput.style.height = "auto";
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + "px";
  }

  function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function updateUiLanguage() {
    var lang = getLang();
    document.documentElement.setAttribute("lang", lang);
    chatInput.placeholder = t("inputPlaceholder");
    chatSend.textContent = isSending ? t("sending") : t("send");
    chatClose.setAttribute("aria-label", t("closeAria"));

    if (pageData.pageTitle) {
      chatSubtitle.textContent = t("askPage") + pageData.pageTitle;
    } else {
      chatSubtitle.textContent = t("subtitleDefault");
    }
  }

  function setLoading(loading) {
    isSending = !!loading;
    chatSend.disabled = loading;
    chatInput.disabled = loading;
    chatSend.textContent = loading ? t("sending") : t("send");
    setStatus(loading ? t("loading") : "");
  }

  function normalizeHistory(history) {
    if (!Array.isArray(history)) return [];
    return history
      .map(function (item) {
        return {
          role: item && item.role === "assistant" ? "assistant" : "user",
          content: truncateText(item && item.content ? item.content : "", 1200)
        };
      })
      .filter(function (item) { return !!item.content; })
      .slice(-MAX_HISTORY_ITEMS);
  }

  function clearStoredHistory() {
    try {
      sessionStorage.removeItem(getHistoryPayloadKey());
    } catch (e) {}
  }

  function getStoredHistory() {
    try {
      var raw = sessionStorage.getItem(getHistoryPayloadKey());
      if (!raw) return [];

      var parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== "object") {
        clearStoredHistory();
        return [];
      }

      var savedAt = Number(parsed.savedAt || 0);
      var history = Array.isArray(parsed.history) ? parsed.history : [];

      if (!savedAt || (Date.now() - savedAt > HISTORY_EXPIRY_MS)) {
        clearStoredHistory();
        return [];
      }

      return normalizeHistory(history);
    } catch (e) {
      clearStoredHistory();
      return [];
    }
  }

  function saveStoredHistory(history) {
    try {
      sessionStorage.setItem(
        getHistoryPayloadKey(),
        JSON.stringify({
          savedAt: Date.now(),
          history: normalizeHistory(history)
        })
      );
    } catch (e) {}
  }

  function addMessage(role, text) {
    var row = document.createElement("div");
    row.className = "message-row " + role;

    var bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = formatMessageHtml(text);

    row.appendChild(bubble);
    chatMessages.appendChild(row);
    scrollToBottom();
    return row;
  }

  function updateMessage(row, text) {
    if (!row) return;
    var bubble = row.querySelector(".bubble");
    if (!bubble) return;
    bubble.innerHTML = formatMessageHtml(text);
    scrollToBottom();
  }

  function renderStoredHistory() {
    var history = getStoredHistory();
    if (!history.length) return;

    history.forEach(function (item) {
      addMessage(item.role, item.content);
    });

    saveStoredHistory(history);
  }

  function renderWelcomeIfNeeded() {
    if (getStoredHistory().length) return;
    if (chatMessages.children.length) return;
    addMessage("assistant", getLocalizedWelcomeMessage());
  }

  function applyAgentData() {
    chatTitle.textContent = agentData.agentName || "SiteMind AI";
    updateUiLanguage();
  }

  async function fetchAgentConfig() {
    try {
      var res = await fetch(API_BASE + "?action=agent-config&agentId=" + encodeURIComponent(agentId));
      if (!res.ok) return;

      var data = await res.json();
      if (!data) return;

      agentData.agentId = data.agentId || agentId;
      agentData.agentName = data.agentName || "SiteMind AI";
      agentData.welcomeMessage = data.welcomeMessage || "";
      agentData.themeColor = data.themeColor || "#081F39";

      applyAgentData();
    } catch (e) {}
  }

  function parseErrorText(text) {
    var fallback = t("errorGeneric");
    var raw = String(text || "").trim();
    if (!raw) return fallback;

    try {
      var data = JSON.parse(raw);
      if (data && typeof data === "object") {
        if (typeof data.details === "string") return data.details;
        if (data.details) return JSON.stringify(data.details);
        if (data.message) return String(data.message);
        if (data.error) return String(data.error);
      }
    } catch (e) {}

    return raw.slice(0, 500);
  }

  function getTypingSpeed() {
    return 20 + Math.random() * 15;
  }

  function createStreamTyper(row) {
    var renderedText = "";
    var targetText = "";
    var timer = null;
    var finished = false;

    function tick() {
      if (renderedText.length < targetText.length) {
        renderedText += targetText.charAt(renderedText.length);
        updateMessage(row, renderedText);
        timer = setTimeout(tick, getTypingSpeed());
        return;
      }

      timer = null;

      if (finished) {
        updateMessage(row, targetText);
      }
    }

    return {
      push: function (text) {
        targetText = normalizeResponseText(text);
        if (!timer) {
          tick();
        }
      },
      finish: function (text) {
        targetText = normalizeResponseText(text);
        finished = true;

        if (!timer && renderedText !== targetText) {
          tick();
        } else if (!timer) {
          updateMessage(row, targetText);
        }
      }
    };
  }

  async function sendMessageToApi(userMessage, onChunk) {
    var history = getStoredHistory();
    history.push({ role: "user", content: userMessage });
    history = normalizeHistory(history);

    if (activeController) {
      try { activeController.abort(); } catch (e) {}
    }

    activeController = new AbortController();

    var timeoutId = setTimeout(function () {
      try { activeController.abort(); } catch (e) {}
    }, REQUEST_TIMEOUT);

    try {
      var response = await fetch(API_BASE, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        signal: activeController.signal,
        body: JSON.stringify({
          action: "chat",
          agentId: agentId,
          language: getLang(),
          pageTypeHint: pageData.pageTypeHint || "general",
          message: userMessage,
          history: history,
          pageTitle: pageData.pageTitle,
          pageDescription: pageData.pageDescription,
          pageUrl: pageData.pageUrl,
          pageContext: pageData.pageContext,
          pageText: pageData.pageText,
          h1: pageData.h1,
          headings: pageData.headings
        })
      });

      if (!response.ok) {
        var errorText = await response.text();
        throw new Error(parseErrorText(errorText));
      }

      if (!response.body) {
        throw new Error("No response body received.");
      }

      var reader = response.body.getReader();
      var decoder = new TextDecoder();
      var fullText = "";

      while (true) {
        var result = await reader.read();
        if (result.done) break;

        var chunk = decoder.decode(result.value, { stream: true });
        if (!chunk) continue;

        fullText += chunk;

        if (typeof onChunk === "function") {
          onChunk(fullText);
        }
      }

      fullText = String(fullText || "").trim();

      if (!fullText) {
        throw new Error("No reply received.");
      }

      return fullText;
    } finally {
      clearTimeout(timeoutId);
      activeController = null;
    }
  }

  async function handleSubmit(event) {
    event.preventDefault();
    if (isSending) return;

    var userMessage = cleanText(chatInput.value || "");
    if (!userMessage) return;

    addMessage("user", userMessage);
    chatInput.value = "";
    autoResizeTextarea();
    setLoading(true);

    var placeholder = addMessage("assistant", "");
    var typer = createStreamTyper(placeholder);
    var finalAnswer = "";

    try {
      setStatus(t("streaming"));

      finalAnswer = await sendMessageToApi(userMessage, function (partialText) {
        typer.push(partialText || t("loading"));
      });

      typer.finish(finalAnswer);

      var history = getStoredHistory();
      history.push({ role: "user", content: userMessage });
      history.push({ role: "assistant", content: normalizeResponseText(finalAnswer) });
      saveStoredHistory(history);
    } catch (error) {
      var msg = t("errorGeneric");

      if (error && error.name === "AbortError") {
        msg = t("errorTimeout");
      } else if (error && error.message) {
        msg = error.message;
      }

      updateMessage(placeholder, msg);
    } finally {
      setLoading(false);
      setStatus("");
    }
  }

  window.addEventListener("message", function (event) {
    if (!event.data || typeof event.data !== "object") return;

    if (event.data.type === "sitemind-page-context") {
      pageData.pageTitle = truncateText(event.data.pageTitle || "", 300);
      pageData.pageDescription = truncateText(event.data.pageDescription || "", 500);
      pageData.pageUrl = truncateText(event.data.pageUrl || "", 500);
      pageData.pageContext = truncateText(event.data.pageContext || "", 5000);
      pageData.pageText = truncateText(event.data.pageText || event.data.pageContext || "", 7000);
      pageData.h1 = truncateText(event.data.h1 || "", 300);
      pageData.language = normalizeLang(event.data.language || initialLang || "en");
      pageData.pageTypeHint = truncateText(event.data.pageTypeHint || "general", 50);

      if (Array.isArray(event.data.headings)) {
        pageData.headings = event.data.headings
          .map(function (item) { return truncateText(item, 200); })
          .filter(function (item) { return !!item; })
          .slice(0, 12);
      } else {
        pageData.headings = [];
      }

      updateUiLanguage();
      renderWelcomeIfNeeded();
    }

    if (event.data.type === "sitemind-agent-config") {
      agentData.agentId = event.data.agentId || agentId;
      agentData.agentName = event.data.agentName || "SiteMind AI";
      agentData.welcomeMessage = event.data.welcomeMessage || "";
      agentData.themeColor = event.data.themeColor || "#081F39";
      applyAgentData();
    }
  });

  chatForm.addEventListener("submit", handleSubmit);
  chatInput.addEventListener("input", autoResizeTextarea);

  chatInput.addEventListener("keydown", function (event) {
    if (event.key === "Enter" && !event.shiftKey) {
      event.preventDefault();
      handleSubmit(event);
    }
  });

  chatClose.addEventListener("click", function () {
    notifyParentClose();
  });

  renderStoredHistory();
  updateUiLanguage();
  applyAgentData();
  autoResizeTextarea();

  fetchAgentConfig();
  setTimeout(function () {
    renderWelcomeIfNeeded();
  }, 300);

  requestPageContextRefresh();

  if (window.parent && window.parent !== window) {
    try {
      window.parent.postMessage({ type: "sitemind-widget-ready", agentId: agentId }, "*");
    } catch (e) {}
  }
})();
</script>
</body>
</html>
