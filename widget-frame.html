<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteMind AI</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --text: #eef4ff;
      --muted: rgba(238, 244, 255, 0.68);
      --accent: #2563eb;
      --accent-2: #1d4ed8;
      --border: rgba(255, 255, 255, 0.08);
      --bubble-bot: rgba(255, 255, 255, 0.06);
      --bubble-user: linear-gradient(135deg, #2563eb, #1d4ed8);
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: transparent;
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.18), transparent 30%),
        linear-gradient(180deg, #0a1020 0%, #060b16 100%);
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
    }

    .header {
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
    }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }

    .header-subtitle {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
    }

    .msg {
      max-width: 86%;
      padding: 11px 13px;
      margin-bottom: 10px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.48;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bot {
      background: var(--bubble-bot);
      border: 1px solid rgba(255,255,255,0.06);
      border-bottom-left-radius: 6px;
    }

    .user {
      margin-left: auto;
      background: var(--bubble-user);
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .typing {
      opacity: 0.85;
      font-style: italic;
    }

    .composer {
      padding: 12px;
      border-top: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.14);
    }

    .composer-inner {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 8px;
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 46px;
      max-height: 120px;
      padding: 12px;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      line-height: 1.4;
      font-family: Inter, Arial, sans-serif;
    }

    textarea::placeholder {
      color: rgba(238, 244, 255, 0.45);
    }

    button {
      height: 44px;
      min-width: 92px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
      padding: 0 16px;
    }

    .debug {
      font-size: 11px;
      color: var(--muted);
      padding: 0 14px 8px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="header-title" id="chat-header">SiteMind AI</div>
      <div class="header-subtitle" id="chat-subtitle">AI help for this page</div>
    </div>

    <div id="messages" class="messages"></div>
    <div id="debug" class="debug"></div>

    <div class="composer">
      <div class="composer-inner">
        <textarea id="input" placeholder="Type your message..."></textarea>
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script>
    let agentLoaded = false;
    let welcomeShown = false;

    const params = new URLSearchParams(window.location.search);
    const agentId = params.get("agentId") || "demo-agent";
    const baseUrl = (params.get("baseUrl") || window.location.origin).replace(/\/$/, "");

    const messages = document.getElementById("messages");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const header = document.getElementById("chat-header");
    const subtitle = document.getElementById("chat-subtitle");
    const debugEl = document.getElementById("debug");

    let pageContext = {
      pageUrl: "",
      pageTitle: "",
      pageDescription: "",
      pageText: "",
      lang: "en"
    };

    const uiText = {
      hr: {
        title: "SiteMind AI",
        subtitle: "AI pomoД‡ za ovu stranicu",
        welcome: "Bok! Kako vam mogu pomoД‡i?",
        placeholder: "UpiЕЎite pitanje...",
        send: "PoЕЎalji",
        typing: "AI razmiЕЎlja...",
        commError: "GreЕЎka u komunikaciji.",
        apiError: "API greЕЎka: ",
        noAnswer: "Nema odgovora."
      },
      en: {
        title: "SiteMind AI",
        subtitle: "AI help for this page",
        welcome: "Hi! How can I help?",
        placeholder: "Type your message...",
        send: "Send",
        typing: "AI is thinking...",
        commError: "Communication error.",
        apiError: "API error: ",
        noAnswer: "No answer."
      },
      de: {
        title: "SiteMind AI",
        subtitle: "KI-Hilfe fГјr diese Seite",
        welcome: "Hallo! Wie kann ich helfen?",
        placeholder: "Nachricht eingeben...",
        send: "Senden",
        typing: "KI denkt nach...",
        commError: "Kommunikationsfehler.",
        apiError: "API-Fehler: ",
        noAnswer: "Keine Antwort."
      }
    };

    function normalizeLang(lang) {
      const raw = (lang || "").toLowerCase();

      if (
        raw.indexOf("hr") === 0 ||
        raw.indexOf("bs") === 0 ||
        raw.indexOf("sr") === 0
      ) {
        return "hr";
      }

      if (raw.indexOf("de") === 0) {
        return "de";
      }

      return "en";
    }

    function getLocale(lang) {
      if (lang === "hr") return uiText.hr;
      if (lang === "de") return uiText.de;
      return uiText.en;
    }

    function detectUserLanguageFromMessage(message, fallback) {
      const m = (message || "").trim().toLowerCase();

      if (!m) return normalizeLang(fallback || "en");

      if (/[ДЌД‡ЕѕЕЎД‘]/.test(m)) return "hr";
      if (/[Г¤Г¶ГјГџ]/.test(m)) return "de";

      if (
        /\b(kako|sto|ЕЎto|sta|ЕЎta|koliko|gdje|gde|moze|moЕѕe|trebam|zelim|Еѕelim|cijena|kontakt|usluga|pomoc|pomoД‡|stranica|stranici|ovoj|cemu|ДЌemu|radi|ucenje|uДЌenje|njemacki|njemaДЌki|lekcije|tecaj|teДЌaj)\b/.test(m)
      ) {
        return "hr";
      }

      if (
        /\b(wie|was|worum|seite|inhalt|hilfe|kontakt|preis|deutsch|lektion|lektionen|lernen|kurs|ich|mГ¶chte|mochte|bitte|danke)\b/.test(m)
      ) {
        return "de";
      }

      if (
        /\b(how|what|about|page|content|help|contact|price|course|lesson|lessons|learn|learning|german|service)\b/.test(m)
      ) {
        return "en";
      }

      return normalizeLang(fallback || "en");
    }

    function applyLanguageToUI() {
      pageContext.lang = normalizeLang(pageContext.lang);
      const t = getLocale(pageContext.lang);

      document.documentElement.lang = pageContext.lang;
      document.title = t.title;

      if (!agentLoaded) {
        header.textContent = t.title;
      }

      subtitle.textContent = t.subtitle;
      input.placeholder = t.placeholder;
      sendBtn.textContent = t.send;
    }

    function addMessage(text, type, extraClass) {
      const div = document.createElement("div");
      div.className = "msg " + type + (extraClass ? " " + extraClass : "");
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function showWelcomeIfNeeded() {
      if (welcomeShown) return;
      const t = getLocale(pageContext.lang);
      addMessage(t.welcome, "bot");
      welcomeShown = true;
    }

    window.addEventListener("message", function (event) {
      if (!event.data || event.data.type !== "sitemind_page_context") return;

      pageContext = event.data.payload || pageContext;
      pageContext.lang = normalizeLang(pageContext.lang);

      applyLanguageToUI();
      showWelcomeIfNeeded();
    });

    async function sendMessage(message, userLang) {
      const res = await fetch(baseUrl + "/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: message,
          agentId: agentId,
          userLang: userLang,
          pageContext: pageContext
        })
      });

      const text = await res.text();

      try {
        return JSON.parse(text);
      } catch (e) {
        return {
          error: "API did not return JSON",
          raw: text
        };
      }
    }

    async function handleSend() {
      const message = input.value.trim();
      if (!message) return;

      const userLang = detectUserLanguageFromMessage(message, pageContext.lang);
      const t = getLocale(userLang);

      addMessage(message, "user");
      input.value = "";
      input.style.height = "46px";
      sendBtn.disabled = true;

      const typingDiv = addMessage(t.typing, "bot", "typing");

      try {
        const data = await sendMessage(message, userLang);
        typingDiv.remove();

        if (data && data.agent && !agentLoaded) {
          if (data.agent.agentName) {
            header.textContent = data.agent.agentName;
          }
          agentLoaded = true;
        }

        if (data && data.answer) {
          addMessage(data.answer, "bot");
        } else if (data && data.error) {
          addMessage(t.apiError + data.error, "bot");
        } else {
          addMessage(t.noAnswer, "bot");
        }

        if (data && data.debug) {
          debugEl.textContent =
            "Page title: " + (data.debug.pageTitle || "-") +
            " | Text length: " + data.debug.pageTextLength +
            " | Lang: " + data.debug.lang;
        }
      } catch (err) {
        typingDiv.remove();
        addMessage(t.commError, "bot");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener("click", handleSend);

    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    input.addEventListener("input", function () {
      input.style.height = "46px";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    });

    applyLanguageToUI();
  </script>
</body>
</html>
