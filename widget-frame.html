<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteMind AI</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-1: #ffffff;
      --bg-2: #ffffff;
      --bg-3: #f8fbff;
      --panel: rgba(255, 255, 255, 0.98);
      --panel-strong: rgba(255, 255, 255, 1);
      --text: #0f172a;
      --muted: #64748b;
      --muted-2: #94a3b8;
      --border: rgba(37, 99, 235, 0.12);
      --border-strong: rgba(37, 99, 235, 0.20);
      --user-grad-1: #2563eb;
      --user-grad-2: #1d4ed8;
      --assistant-bg: #f8fbff;
      --header-grad-1: #2563eb;
      --header-grad-2: #1d4ed8;
      --header-grad-3: #1e40af;
      --accent: #2563eb;
      --accent-2: #1d4ed8;
      --shadow-md: 0 10px 28px rgba(15, 23, 42, 0.10);
      --shadow-lg: 0 18px 42px rgba(15, 23, 42, 0.12);
      --glow: 0 0 0 1px rgba(37, 99, 235, 0.10), 0 0 20px rgba(37, 99, 235, 0.08);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.05), transparent 26%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.04), transparent 22%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .chat-shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,1), rgba(248,251,255,1));
    }

    .chat-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.06), transparent 22%),
        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.04), transparent 26%);
      z-index: 0;
    }

    .chat-header {
      position: relative;
      z-index: 1;
      padding: 14px 18px 16px;
      color: #ffffff;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.14), transparent 24%),
        linear-gradient(135deg, var(--header-grad-1) 0%, var(--header-grad-2) 58%, var(--header-grad-3) 100%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.14);
    }

    .chat-header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .chat-header-left {
      min-width: 0;
      flex: 1;
    }

    .brand-link {
      display: inline-block;
      margin: 0 0 7px;
      font-size: 10px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.35px;
      color: rgba(255, 255, 255, 0.86);
      text-decoration: none;
      opacity: 0.95;
    }

    .brand-link:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    .chat-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.2px;
      padding-right: 6px;
      word-break: break-word;
      color: #ffffff;
    }

    .chat-close {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.12);
      color: #ffffff;
      width: 34px;
      height: 34px;
      min-width: 34px;
      padding: 0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 20px;
      line-height: 34px;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    }

    .chat-close:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.28);
      transform: translateY(-1px);
    }

    .chat-subtitle {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.88);
      line-height: 1.45;
      max-width: 96%;
    }

    .chat-messages {
      position: relative;
      z-index: 1;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 18px 14px 12px;
      background: transparent;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 8px;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.32);
      border-radius: 999px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .message-row {
      display: flex;
      margin-bottom: 14px;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 88%;
      padding: 13px 15px;
      border-radius: 18px;
      font-size: 16px;
      line-height: 1.7;
      word-wrap: break-word;
      white-space: pre-wrap;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(12px);
    }

    .message-row.user .bubble {
      background: linear-gradient(135deg, var(--user-grad-1), var(--user-grad-2));
      color: #ffffff;
      font-weight: 600;
      border-bottom-right-radius: 6px;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.20);
    }

    .message-row.assistant .bubble {
      background: var(--assistant-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
      box-shadow: var(--shadow-lg);
    }
.bubble a {
  color: #1d4ed8;
  text-decoration: underline;
  font-weight: 600;
  word-break: break-word;
}

.bubble a:hover {
  color: #1e40af;
}

.message-row.user .bubble a {
  color: #ffffff;
}
    .chat-status {
      position: relative;
      z-index: 1;
      min-height: 24px;
      padding: 0 16px 10px;
      font-size: 12px;
      color: var(--muted);
      background: transparent;
      flex-shrink: 0;
    }

    .chat-form {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      box-shadow: 0 -8px 24px rgba(15, 23, 42, 0.06);
    }

    .chat-input {
      flex: 1;
      resize: none;
      min-height: 48px;
      max-height: 120px;
      padding: 12px 14px;
      border: 1px solid var(--border-strong);
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.6;
      font-family: Inter, Arial, sans-serif;
      font-weight: 500;
      outline: none;
      background: #ffffff;
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .chat-input::placeholder {
      color: var(--muted-2);
    }

    .chat-input:focus {
      border-color: rgba(37, 99, 235, 0.45);
      box-shadow: var(--glow);
      background: #ffffff;
    }

    .chat-send {
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #ffffff;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 800;
      min-width: 96px;
      height: 48px;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.18);
      transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
      white-space: nowrap;
    }

    .chat-send:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.22);
      filter: brightness(1.03);
    }

    .chat-send:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    @media (min-width: 480px) {
      .chat-shell {
        border-left: 1px solid rgba(37, 99, 235, 0.10);
      }

      .chat-header {
        padding: 16px 20px 18px;
      }

      .chat-title {
        font-size: 17px;
      }

      .chat-messages {
        padding: 20px 16px 12px;
      }

      .bubble {
        max-width: 84%;
      }

      .chat-form {
        padding: 14px;
      }
    }

    @media (max-width: 460px) {
      .chat-header {
        padding: 14px 14px 14px;
      }

      .chat-messages {
        padding: 14px 12px 10px;
      }

      .bubble {
        max-width: 90%;
        font-size: 15px;
      }

      .chat-form {
        padding: 10px;
        gap: 8px;
      }

      .chat-send {
        min-width: 82px;
        padding: 0 14px;
      }

      .chat-close {
        width: 32px;
        height: 32px;
        min-width: 32px;
      }

      .chat-input {
        font-size: 15px;
      }
    }

    .sm-header-brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .sm-title-wrap{
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .sm-face{
      width:52px;
      height:52px;
      min-width:52px;
      border-radius:14px;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.08)),
        linear-gradient(135deg, #1d4ed8, #2563eb 60%, #1e40af);
      border:1px solid rgba(255,255,255,0.22);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.10),
        0 8px 20px rgba(37, 99, 235, 0.18);
    }

    .sm-face::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.12), transparent 35%),
        radial-gradient(circle at 75% 75%, rgba(191,219,254,0.18), transparent 30%);
      pointer-events:none;
    }

    .sm-eyes{
      position:relative;
      z-index:1;
      display:flex;
      align-items:center;
      gap:5px;
    }

    .sm-eye{
      width:16px;
      height:22px;
      border-radius:4px;
      background:linear-gradient(180deg, #ffffff 0%, #dbeafe 45%, #bfdbfe 100%);
      box-shadow:
        0 0 10px rgba(255,255,255,0.28),
        0 0 18px rgba(219,234,254,0.16),
        inset 0 1px 0 rgba(255,255,255,0.65);
      transition:
        height 0.14s ease,
        transform 0.22s ease,
        opacity 0.22s ease,
        border-radius 0.22s ease;
      transform-origin:center center;
    }

    .sm-face::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:5px;
      transform:translateX(-50%);
      width:10px;
      height:4px;
      border-radius:0 0 6px 6px;
      border-bottom:2px solid rgba(255, 255, 255, 0.92);
      opacity:0.9;
      z-index:1;
      box-shadow:0 0 6px rgba(255,255,255,0.16);
    }

    .sm-face.sm-blink .sm-eye{
      height:4px;
      border-radius:6px;
    }

    .sm-face.sm-think-1 .sm-eye-left{
      transform:rotate(-10deg) translateY(1px);
    }

    .sm-face.sm-think-1 .sm-eye-right{
      transform:rotate(10deg) translateY(1px);
    }

    .sm-face.sm-think-2 .sm-eye-left{
      transform:rotate(-16deg) translateY(2px) scaleY(0.92);
    }

    .sm-face.sm-think-2 .sm-eye-right{
      transform:rotate(16deg) translateY(2px) scaleY(0.92);
    }

    .sm-face.sm-think-3 .sm-eye-left{
      transform:skewY(-8deg) translateY(1px);
    }

    .sm-face.sm-think-3 .sm-eye-right{
      transform:skewY(8deg) translateY(1px);
    }

    @media (max-width: 480px){
      .sm-face{
        width:48px;
        height:48px;
        min-width:48px;
      }

      .sm-eye{
        width:14px;
        height:21px;
      }

      .sm-header-brand{
        gap:10px;
      }
    }
  </style>
</head>
<body>
<div class="chat-shell">
  <div class="chat-header" id="chatHeader">
    <div class="chat-header-top">
      <div class="chat-header-left">
        <div class="sm-header-brand">
          <div class="sm-face" id="smFace" aria-hidden="true">
            <div class="sm-eyes">
              <div class="sm-eye sm-eye-left"></div>
              <div class="sm-eye sm-eye-right"></div>
            </div>
          </div>

          <div class="sm-title-wrap">
            <a class="brand-link" href="https://sitemindai.app" target="_blank" rel="noopener noreferrer"> Powered by SiteMind Ai Labs</a>
            <div class="chat-title" id="chatTitle">SiteMind AI</div>
          </div>
        </div>
      </div>

      <button type="button" class="chat-close" id="chatClose" aria-label="Close chat">×</button>
    </div>

    <div class="chat-subtitle" id="chatSubtitle">Ask AI Agent</div>
  </div>

  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-status" id="chatStatus"></div>

  <form class="chat-form" id="chatForm">
    <textarea
      id="chatInput"
      class="chat-input"
      placeholder="Type a question..."
      rows="1"
    ></textarea>
    <button type="submit" id="chatSend" class="chat-send">Send</button>
  </form>
</div>

<script>
(function () {
  "use strict";

  var API_BASE = "https://ai-tutor-rouge-theta.vercel.app/api/index";
  var REQUEST_TIMEOUT = 30000;
  var MAX_HISTORY_ITEMS = 10;
  var HISTORY_EXPIRY_MS = 45 * 60 * 1000;

  var chatForm = document.getElementById("chatForm");
  var chatInput = document.getElementById("chatInput");
  var chatSend = document.getElementById("chatSend");
  var chatMessages = document.getElementById("chatMessages");
  var chatStatus = document.getElementById("chatStatus");
  var chatTitle = document.getElementById("chatTitle");
  var chatSubtitle = document.getElementById("chatSubtitle");
  var chatHeader = document.getElementById("chatHeader");
  var chatClose = document.getElementById("chatClose");

  var params = new URLSearchParams(window.location.search);
  var agentId = params.get("agentId") || "demo-agent";

 function normalizeLang(value) {
  var lang = String(value || "").toLowerCase().trim();

  if (!lang) return "en";
  if (lang.indexOf("hr") === 0 || lang.indexOf("bs") === 0 || lang.indexOf("sr") === 0) return "hr";
  if (lang.indexOf("de") === 0) return "de";
  if (lang.indexOf("it") === 0) return "it";
  if (lang.indexOf("fr") === 0) return "fr";
  if (lang.indexOf("en") === 0) return "en";

  return "en";
}

  var initialLang = normalizeLang(
    params.get("lang") ||
    document.documentElement.getAttribute("lang") ||
    (navigator.language || navigator.userLanguage || "en")
  );

  var pageData = {
    pageTitle: "",
    pageDescription: "",
    pageUrl: "",
    pageContext: "",
    pageText: "",
    h1: "",
    headings: [],
    language: initialLang,
    pageTypeHint: "general"
  };

  var agentData = {
    agentId: agentId,
    agentName: "SiteMind AI",
    welcomeMessage: "",
    themeColor: "#2563eb"
  };

  var isSending = false;
  var activeController = null;

  var UI_TEXT = {
    hr: {
      subtitleDefault: "Pitaj AI asistenta",
      inputPlaceholder: "Napiši pitanje...",
      send: "Pošalji",
      sending: "...",
      loading: "Samo trenutak...",
      streaming: "AI odgovara...",
      errorGeneric: "Došlo je do greške. Pokušaj ponovo.",
      errorTimeout: "Zahtjev je trajao predugo. Pokušaj kraće pitanje.",
      welcome: "Pozdrav! Mogu pomoći sa sadržajem ove stranice, uslugama, proizvodima ili općim pitanjima.",
      askPage: "Pitaj AI o: ",
      closeAria: "Zatvori chat",
      openStatus: ""
    },
    de: {
      subtitleDefault: "Frag den KI-Assistenten",
      inputPlaceholder: "Schreibe eine Frage...",
      send: "Senden",
      sending: "...",
      loading: "Einen Moment...",
      streaming: "KI antwortet...",
      errorGeneric: "Etwas ist schiefgelaufen. Bitte versuche es erneut.",
      errorTimeout: "Die Anfrage hat zu lange gedauert. Versuche eine kürzere Frage.",
      welcome: "Hallo! Ich kann dir mit dem Inhalt dieser Seite, Services, Produkten oder allgemeinen Fragen helfen.",
      askPage: "Frage die KI zu: ",
      closeAria: "Chat schließen",
      openStatus: ""
    },
    it: {
      subtitleDefault: "Chiedi all'assistente AI",
      inputPlaceholder: "Scrivi una domanda...",
      send: "Invia",
      sending: "...",
      loading: "Un momento...",
      streaming: "L'AI sta rispondendo...",
      errorGeneric: "Si è verificato un errore. Riprova.",
      errorTimeout: "La richiesta ha richiesto troppo tempo. Prova con una domanda più breve.",
      welcome: "Ciao! Posso aiutarti con il contenuto di questa pagina, servizi, prodotti o domande generali.",
      askPage: "Chiedi all'AI di: ",
      closeAria: "Chiudi chat",
      openStatus: ""
    },
    fr: {
  subtitleDefault: "Demandez à l’assistant IA",
  inputPlaceholder: "Écrivez une question...",
  send: "Envoyer",
  sending: "...",
  loading: "Un instant...",
  streaming: "L’IA répond...",
  errorGeneric: "Une erreur s’est produite. Veuillez réessayer.",
  errorTimeout: "La requête a pris trop de temps. Essayez une question plus courte.",
  welcome: "Bonjour ! Je peux vous aider avec le contenu de cette page, les services, les produits ou des questions générales.",
  askPage: "Demandez à l’IA à propos de : ",
  closeAria: "Fermer le chat",
  openStatus: ""
},
    en: {
      subtitleDefault: "Ask AI Agent",
      inputPlaceholder: "Type a question...",
      send: "Send",
      sending: "...",
      loading: "One moment...",
      streaming: "AI is replying...",
      errorGeneric: "Something went wrong. Please try again.",
      errorTimeout: "The request took too long. Try a shorter question.",
      welcome: "Hello! I can help with this page, services, products, or general questions.",
      askPage: "Ask AI about: ",
      closeAria: "Close chat",
      openStatus: ""
    }
  };

  function detectPreferredLang() {
    return normalizeLang(
      pageData.language ||
      params.get("lang") ||
      document.documentElement.getAttribute("lang") ||
      (navigator.language || navigator.userLanguage || "en")
    );
  }

  function getLang() {
    return detectPreferredLang();
  }

  function t(key) {
    var lang = getLang();
    return (UI_TEXT[lang] && UI_TEXT[lang][key]) || UI_TEXT.en[key] || "";
  }

  function getLocalizedWelcomeMessage() {
    var lang = getLang();

    if (agentData.welcomeMessage && typeof agentData.welcomeMessage === "object") {
      return (
        agentData.welcomeMessage[lang] ||
        agentData.welcomeMessage.en ||
        t("welcome")
      );
    }

    return t("welcome");
  }

  function getHistoryPayloadKey() {
    return "sitemind_history_payload_" + agentId;
  }

  function escapeHtml(str) {
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }
function formatMessageHtml(text) {
  var escaped = escapeHtml(text).replace(/\n/g, "<br>");

  return escaped.replace(
    /(https?:\/\/[^\s<]+)/g,
    function (url) {
      var cleanUrl = url.replace(/&lt;br&gt;$/, "");
      return '<a href="' + cleanUrl + '" target="_blank" rel="noopener noreferrer">' + cleanUrl + "</a>";
    }
  );
}
  function cleanText(value) {
    return String(value || "")
      .replace(/\u00A0/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function truncateText(value, max) {
    var text = cleanText(value);
    if (text.length <= max) return text;
    return text.slice(0, max);
  }

  function notifyParentClose() {
    if (window.parent && window.parent !== window) {
      try {
        window.parent.postMessage(
          {
            type: "sitemind-close-widget",
            agentId: agentId
          },
          "*"
        );
      } catch (e) {}
    }
  }

  function requestPageContextRefresh() {
    if (window.parent && window.parent !== window) {
      try {
        window.parent.postMessage(
          {
            type: "sitemind-refresh-page-context",
            agentId: agentId
          },
          "*"
        );
      } catch (e) {}
    }
  }

  function setStatus(text) {
    chatStatus.textContent = text || "";
  }

  function autoResizeTextarea() {
    chatInput.style.height = "auto";
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + "px";
  }

  function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function updateUiLanguage() {
    var lang = getLang();

    document.documentElement.setAttribute("lang", lang);
    chatInput.placeholder = t("inputPlaceholder");
    chatSend.textContent = isSending ? t("sending") : t("send");
    chatClose.setAttribute("aria-label", t("closeAria"));

    if (pageData.pageTitle) {
      chatSubtitle.textContent = t("askPage") + pageData.pageTitle;
    } else {
      chatSubtitle.textContent = t("subtitleDefault");
    }
  }

  function setLoading(loading) {
    isSending = !!loading;
    chatSend.disabled = loading;
    chatInput.disabled = loading;
    chatSend.textContent = loading ? t("sending") : t("send");
    setStatus(loading ? t("loading") : "");
  }

  function normalizeHistory(history) {
    if (!Array.isArray(history)) return [];

    return history
      .map(function (item) {
        return {
          role: item && item.role === "assistant" ? "assistant" : "user",
          content: truncateText(item && item.content ? item.content : "", 1200)
        };
      })
      .filter(function (item) {
        return item.content;
      })
      .slice(-MAX_HISTORY_ITEMS);
  }

  function clearStoredHistory() {
    try {
      sessionStorage.removeItem(getHistoryPayloadKey());
    } catch (e) {}
  }

  function getStoredHistory() {
    try {
      var raw = sessionStorage.getItem(getHistoryPayloadKey());
      if (!raw) return [];

      var parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== "object") {
        clearStoredHistory();
        return [];
      }

      var savedAt = Number(parsed.savedAt || 0);
      var history = Array.isArray(parsed.history) ? parsed.history : [];

      if (!savedAt || (Date.now() - savedAt > HISTORY_EXPIRY_MS)) {
        clearStoredHistory();
        return [];
      }

      return normalizeHistory(history);
    } catch (e) {
      clearStoredHistory();
      return [];
    }
  }

  function saveStoredHistory(history) {
    try {
      var normalized = normalizeHistory(history).slice(-MAX_HISTORY_ITEMS);

      sessionStorage.setItem(
        getHistoryPayloadKey(),
        JSON.stringify({
          savedAt: Date.now(),
          history: normalized
        })
      );
    } catch (e) {}
  }

  function addMessage(role, text) {
    var row = document.createElement("div");
    row.className = "message-row " + role;

    var bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = formatMessageHtml(text);

    row.appendChild(bubble);
    chatMessages.appendChild(row);
    scrollToBottom();

    return row;
  }

  function updateMessage(row, text) {
    if (!row) return;
    var bubble = row.querySelector(".bubble");
    if (!bubble) return;
    bubble.innerHTML = formatMessageHtml(text);
    scrollToBottom();
  }

  function renderStoredHistory() {
    var history = getStoredHistory();
    if (!history.length) return;

    history.forEach(function (item) {
      addMessage(item.role, item.content);
    });

    saveStoredHistory(history);
  }

  function renderWelcomeIfNeeded() {
    var history = getStoredHistory();
    if (history.length) return;
    addMessage("assistant", getLocalizedWelcomeMessage());
  }

  function hexToRgb(hex) {
    var cleaned = String(hex || "").replace("#", "").trim();
    if (cleaned.length === 3) {
      cleaned = cleaned.split("").map(function (c) { return c + c; }).join("");
    }
    if (cleaned.length !== 6) return null;

    var num = parseInt(cleaned, 16);
    if (isNaN(num)) return null;

    return {
      r: (num >> 16) & 255,
      g: (num >> 8) & 255,
      b: num & 255
    };
  }

  function rgbaFromHex(hex, alpha) {
    var rgb = hexToRgb(hex);
    if (!rgb) return "rgba(37, 99, 235, " + alpha + ")";
    return "rgba(" + rgb.r + ", " + rgb.g + ", " + rgb.b + ", " + alpha + ")";
  }

  function applyAgentData() {
    var color = agentData.themeColor || "#2563eb";
    var darker = "#1d4ed8";
    var darker2 = "#1e40af";
    var glowSoft = rgbaFromHex(color, 0.10);

    chatTitle.textContent = agentData.agentName || "SiteMind AI";

    chatHeader.style.background =
      "radial-gradient(circle at top right, rgba(255,255,255,0.14), transparent 24%), linear-gradient(135deg, " + color + " 0%, " + darker + " 58%, " + darker2 + " 100%)";

    chatSend.style.background = "linear-gradient(135deg, " + color + ", " + darker + ")";
    chatSend.style.boxShadow = "0 12px 24px " + rgbaFromHex(color, 0.18);

    chatInput.style.borderColor = "rgba(37, 99, 235, 0.20)";
    chatInput.onfocus = function () {
      chatInput.style.borderColor = rgbaFromHex(color, 0.45);
      chatInput.style.boxShadow = "0 0 0 1px " + rgbaFromHex(color, 0.10) + ", 0 0 20px " + glowSoft;
      chatInput.style.background = "#ffffff";
    };
    chatInput.onblur = function () {
      chatInput.style.borderColor = "rgba(37, 99, 235, 0.20)";
      chatInput.style.boxShadow = "inset 0 1px 0 rgba(255,255,255,0.6)";
      chatInput.style.background = "#ffffff";
    };

    document.documentElement.style.setProperty("--user-grad-1", color);
    document.documentElement.style.setProperty("--user-grad-2", darker);

    updateUiLanguage();
  }

  async function fetchAgentConfig() {
    try {
      var res = await fetch(
        API_BASE + "?action=agent-config&agentId=" + encodeURIComponent(agentId)
      );

      if (!res.ok) return;

      var data = await res.json();
      if (!data) return;

      agentData.agentId = data.agentId || agentId;
      agentData.agentName = data.agentName || "SiteMind AI";
      agentData.welcomeMessage = data.welcomeMessage || "";
      agentData.themeColor = data.themeColor || "#2563eb";

      applyAgentData();
    } catch (e) {}
  }

  function parseErrorText(text) {
    var fallback = t("errorGeneric");
    var raw = String(text || "").trim();
    if (!raw) return fallback;

    try {
      var data = JSON.parse(raw);
      if (data && typeof data === "object") {
        if (data.details) {
          return typeof data.details === "string"
            ? data.details
            : JSON.stringify(data.details);
        }
        if (data.message) return String(data.message);
        if (data.error) return String(data.error);
      }
    } catch (e) {}

    return raw.slice(0, 500);
  }

  async function sendMessageToApi(userMessage, onChunk) {
    var history = normalizeHistory(getStoredHistory());

    if (activeController) {
      try {
        activeController.abort();
      } catch (e) {}
    }

    activeController = new AbortController();

    var timeoutId = setTimeout(function () {
      try {
        activeController.abort();
      } catch (e) {}
    }, REQUEST_TIMEOUT);

    try {
      var response = await fetch(API_BASE, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        signal: activeController.signal,
        body: JSON.stringify({
          action: "chat",
          agentId: agentId,
          language: getLang(),
          pageTypeHint: pageData.pageTypeHint || "general",
          message: userMessage,
          history: history,
          pageTitle: pageData.pageTitle,
          pageDescription: pageData.pageDescription,
          pageUrl: pageData.pageUrl,
          pageContext: pageData.pageContext,
          pageText: pageData.pageText,
          h1: pageData.h1,
          headings: pageData.headings
        })
      });

      if (!response.ok) {
        var errorText = await response.text();
        throw new Error(parseErrorText(errorText));
      }

      if (!response.body) {
        throw new Error("No response body received.");
      }

      var reader = response.body.getReader();
      var decoder = new TextDecoder();
      var fullText = "";

      while (true) {
        var result = await reader.read();
        if (result.done) break;

        var chunk = decoder.decode(result.value, { stream: true });
        if (!chunk) continue;

        fullText += chunk;

        if (typeof onChunk === "function") {
          onChunk(fullText);
        }
      }

      fullText = String(fullText || "").trim();

      if (!fullText) {
        throw new Error("No reply received.");
      }

      return fullText;
    } finally {
      clearTimeout(timeoutId);
      activeController = null;
    }
  }

  async function handleSubmit(event) {
    event.preventDefault();
    if (isSending) return;

    var userMessage = cleanText(chatInput.value || "");
    if (!userMessage) return;

    addMessage("user", userMessage);
    chatInput.value = "";
    autoResizeTextarea();
    setLoading(true);

    var placeholder = addMessage("assistant", t("loading"));
    var finalAnswer = "";

    try {
      setStatus(t("streaming"));

      finalAnswer = await sendMessageToApi(userMessage, function (partialText) {
        updateMessage(placeholder, partialText || t("loading"));
      });

      updateMessage(placeholder, finalAnswer);

      var history = normalizeHistory(getStoredHistory());
      history.push({ role: "user", content: userMessage });
      history.push({ role: "assistant", content: finalAnswer });
      saveStoredHistory(history);
    } catch (error) {
      var msg = t("errorGeneric");

      if (error && error.name === "AbortError") {
        msg = t("errorTimeout");
      } else if (error && error.message) {
        msg = error.message;
      }

      updateMessage(placeholder, msg);
    } finally {
      setLoading(false);
    }
  }

  window.addEventListener("message", function (event) {
    if (!event.data || typeof event.data !== "object") return;

    if (event.data.type === "sitemind-page-context") {
      pageData.pageTitle = truncateText(event.data.pageTitle || "", 300);
      pageData.pageDescription = truncateText(event.data.pageDescription || "", 500);
      pageData.pageUrl = truncateText(event.data.pageUrl || "", 500);
      pageData.pageContext = truncateText(event.data.pageContext || "", 5000);
      pageData.pageText = truncateText(event.data.pageText || event.data.pageContext || "", 7000);
      pageData.h1 = truncateText(event.data.h1 || "", 300);
      pageData.language = normalizeLang(event.data.language || initialLang || "en");
      pageData.pageTypeHint = truncateText(event.data.pageTypeHint || "general", 50);

      if (Array.isArray(event.data.headings)) {
        pageData.headings = event.data.headings
          .map(function (item) {
            return truncateText(item, 200);
          })
          .filter(function (item) {
            return !!item;
          })
          .slice(0, 12);
      } else {
        pageData.headings = [];
      }

      updateUiLanguage();
    }

    if (event.data.type === "sitemind-agent-config") {
      agentData.agentId = event.data.agentId || agentId;
      agentData.agentName = event.data.agentName || "SiteMind AI";
      agentData.welcomeMessage = event.data.welcomeMessage || "";
      agentData.themeColor = event.data.themeColor || "#2563eb";
      applyAgentData();
    }
  });

  chatForm.addEventListener("submit", handleSubmit);
  chatInput.addEventListener("input", autoResizeTextarea);

  chatInput.addEventListener("keydown", function (event) {
    if (event.key === "Enter" && !event.shiftKey) {
      event.preventDefault();
      handleSubmit(event);
    }
  });

  chatClose.addEventListener("click", function () {
    notifyParentClose();
  });

  renderStoredHistory();
  updateUiLanguage();
  applyAgentData();
  autoResizeTextarea();

  fetchAgentConfig().finally(function () {
    renderWelcomeIfNeeded();
  });

  requestPageContextRefresh();

  if (window.parent && window.parent !== window) {
    try {
      window.parent.postMessage(
        {
          type: "sitemind-widget-ready",
          agentId: agentId
        },
        "*"
      );
    } catch (e) {}
  }
})();
</script>

<script>
(function () {
  const face = document.getElementById('smFace');
  if (!face) return;

  const thinkClasses = ['sm-think-1', 'sm-think-2', 'sm-think-3'];
  let isBlinking = false;

  function clearThinking() {
    thinkClasses.forEach(cls => face.classList.remove(cls));
  }

  function blink() {
    if (isBlinking) return;
    isBlinking = true;

    clearThinking();
    face.classList.add('sm-blink');

    setTimeout(() => {
      face.classList.remove('sm-blink');
      isBlinking = false;
    }, 150);
  }

  function randomThinkingPose() {
    if (isBlinking) return;

    clearThinking();

    const shouldThink = Math.random() < 0.55;
    if (!shouldThink) return;

    const cls = thinkClasses[Math.floor(Math.random() * thinkClasses.length)];
    face.classList.add(cls);

    setTimeout(() => {
      face.classList.remove(cls);
    }, 900 + Math.floor(Math.random() * 700));
  }

  function idleMotion() {
    const roll = Math.random();

    if (roll < 0.45) {
      blink();
      return;
    }

    if (roll < 0.85) {
      randomThinkingPose();
      return;
    }

    blink();
    setTimeout(() => {
      randomThinkingPose();
    }, 220);
  }

  setInterval(idleMotion, 2800 + Math.floor(Math.random() * 1200));

  setTimeout(() => {
    blink();
  }, 1200);
})();
</script>
