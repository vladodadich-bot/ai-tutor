<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteMind AI</title>
 <style>
  * {
    box-sizing: border-box;
  }

  :root {
    --bg: #f3f7fb;
    --panel: rgba(255,255,255,0.94);
    --panel-strong: rgba(255,255,255,0.98);
    --line: rgba(15, 23, 42, 0.08);
    --text: #0f172a;
    --muted: #64748b;
    --user-grad-1: #2563eb;
    --user-grad-2: #3b82f6;
    --assistant-bg: #ffffff;
    --shadow-lg: 0 18px 45px rgba(15, 23, 42, 0.16);
    --shadow-md: 0 10px 28px rgba(15, 23, 42, 0.10);
    --radius-xl: 22px;
    --radius-lg: 18px;
    --radius-md: 14px;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
    background:
      radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 28%),
      linear-gradient(180deg, #eef4fb 0%, #f8fbff 100%);
  }

  body {
    display: flex;
    flex-direction: column;
    color: var(--text);
  }

  .chat-shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
    background: transparent;
    overflow: hidden;
  }

  .chat-header {
    position: relative;
    padding: 18px 18px 16px;
    color: #ffffff;
    background:
      radial-gradient(circle at top right, rgba(255,255,255,0.18), transparent 28%),
      linear-gradient(135deg, #1d4ed8 0%, #2563eb 55%, #60a5fa 100%);
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
    border-bottom-left-radius: 22px;
    border-bottom-right-radius: 22px;
    box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
  }

  .chat-title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.2px;
  }

  .chat-subtitle {
    font-size: 12px;
    opacity: 0.92;
    line-height: 1.45;
    max-width: 92%;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px 10px;
    background: transparent;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar {
    width: 8px;
  }

  .chat-messages::-webkit-scrollbar-thumb {
    background: rgba(148, 163, 184, 0.35);
    border-radius: 999px;
  }

  .message-row {
    display: flex;
    margin-bottom: 14px;
  }

  .message-row.user {
    justify-content: flex-end;
  }

  .message-row.assistant {
    justify-content: flex-start;
  }

  .bubble {
    max-width: 86%;
    padding: 12px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    word-wrap: break-word;
    white-space: pre-wrap;
    box-shadow: var(--shadow-md);
    backdrop-filter: blur(10px);
  }

  .message-row.user .bubble {
    background: linear-gradient(135deg, var(--user-grad-1), var(--user-grad-2));
    color: #ffffff;
    border-bottom-right-radius: 6px;
  }

  .message-row.assistant .bubble {
    background: var(--assistant-bg);
    color: var(--text);
    border: 1px solid rgba(148, 163, 184, 0.16);
    border-bottom-left-radius: 6px;
  }

  .chat-status {
    min-height: 22px;
    padding: 0 16px 10px;
    font-size: 12px;
    color: var(--muted);
    background: transparent;
    flex-shrink: 0;
  }

  .chat-form {
    display: flex;
    gap: 10px;
    padding: 12px;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(14px);
    border-top: 1px solid rgba(148, 163, 184, 0.12);
    flex-shrink: 0;
    box-shadow: 0 -8px 24px rgba(15, 23, 42, 0.04);
  }

  .chat-input {
    flex: 1;
    resize: none;
    min-height: 46px;
    max-height: 120px;
    padding: 12px 14px;
    border: 1px solid rgba(148, 163, 184, 0.22);
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    outline: none;
    background: rgba(255,255,255,0.92);
    color: var(--text);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  }

  .chat-input::placeholder {
    color: #94a3b8;
  }

  .chat-input:focus {
    border-color: rgba(37, 99, 235, 0.42);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
    background: #ffffff;
  }

  .chat-send {
    border: 0;
    border-radius: 16px;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: #ffffff;
    padding: 0 18px;
    font-size: 14px;
    font-weight: 700;
    min-width: 92px;
    cursor: pointer;
    box-shadow: 0 12px 24px rgba(37, 99, 235, 0.20);
    transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease;
  }

  .chat-send:hover {
    transform: translateY(-1px);
    box-shadow: 0 14px 28px rgba(37, 99, 235, 0.24);
  }

  .chat-send:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .typing-dots {
    display: inline-block;
    letter-spacing: 2px;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0% { opacity: 0.2; }
    50% { opacity: 1; }
    100% { opacity: 0.2; }
  }
</style>
</head>
<body>
  <div class="chat-shell">
    <div class="chat-header" id="chatHeader">
      <div class="chat-title" id="chatTitle">SiteMind AI</div>
      <div class="chat-subtitle" id="chatSubtitle">Ask Ai Agent</div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-status" id="chatStatus"></div>

    <form class="chat-form" id="chatForm">
      <textarea
        id="chatInput"
        class="chat-input"
        placeholder="Tipe a question..."
        rows="1"
      ></textarea>
      <button type="submit" id="chatSend" class="chat-send">Send</button>
    </form>
  </div>

  <script>
    (function () {
      "use strict";

      var API_BASE = "https://ai-tutor-rouge-theta.vercel.app/api/index";
      var REQUEST_TIMEOUT = 30000;
      var MAX_HISTORY_ITEMS = 12;

      var chatForm = document.getElementById("chatForm");
      var chatInput = document.getElementById("chatInput");
      var chatSend = document.getElementById("chatSend");
      var chatMessages = document.getElementById("chatMessages");
      var chatStatus = document.getElementById("chatStatus");
      var chatTitle = document.getElementById("chatTitle");
      var chatSubtitle = document.getElementById("chatSubtitle");
      var chatHeader = document.getElementById("chatHeader");

      var params = new URLSearchParams(window.location.search);
      var agentId = params.get("agentId") || "demo-agent";

      var pageData = {
        pageTitle: "",
        pageDescription: "",
        pageUrl: "",
        pageContext: ""
      };

      var agentData = {
        agentId: agentId,
        agentName: "SiteMind AI",
        welcomeMessage: "",
        themeColor: "#2563eb"
      };

      var isSending = false;
      var activeController = null;

      function getHistoryKey() {
        return "sitemind_history_" + agentId;
      }

      function escapeHtml(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function setStatus(text) {
        chatStatus.textContent = text || "";
      }

      function autoResizeTextarea() {
        chatInput.style.height = "auto";
        chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + "px";
      }

      function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function setLoading(loading) {
        isSending = !!loading;
        chatSend.disabled = loading;
        chatInput.disabled = loading;
        chatSend.textContent = loading ? "..." : "Send";
        setStatus(loading ? "AI razmišlja..." : "");
      }

      function getStoredHistory() {
        try {
          var raw = localStorage.getItem(getHistoryKey());
          var parsed = raw ? JSON.parse(raw) : [];
          return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          return [];
        }
      }

      function saveStoredHistory(history) {
        try {
          localStorage.setItem(
            getHistoryKey(),
            JSON.stringify(history.slice(-MAX_HISTORY_ITEMS))
          );
        } catch (e) {}
      }

      function normalizeHistory(history) {
        if (!Array.isArray(history)) return [];
        return history
          .map(function (item) {
            return {
              role: item && item.role === "assistant" ? "assistant" : "user",
              content: String(item && item.content ? item.content : "").trim().slice(0, 1500)
            };
          })
          .filter(function (item) {
            return item.content;
          })
          .slice(-MAX_HISTORY_ITEMS);
      }

      function addMessage(role, text) {
        var row = document.createElement("div");
        row.className = "message-row " + role;

        var bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = escapeHtml(text).replace(/\n/g, "<br>");

        row.appendChild(bubble);
        chatMessages.appendChild(row);
        scrollToBottom();

        return row;
      }

      function updateMessage(row, text) {
        if (!row) return;
        var bubble = row.querySelector(".bubble");
        if (!bubble) return;
        bubble.innerHTML = escapeHtml(text).replace(/\n/g, "<br>");
        scrollToBottom();
      }

      function renderStoredHistory() {
        var history = getStoredHistory();
        if (!history.length) return;

        history.forEach(function (item) {
          addMessage(item.role, item.content);
        });
      }

      function renderWelcomeIfNeeded() {
        var history = getStoredHistory();
        if (history.length) return;

        var welcome =
          agentData.welcomeMessage ||
          "Bok! Mogu pomoći oko ove stranice, proizvoda, usluge ili općih tehničkih pitanja.";

        addMessage("assistant", welcome);
      }

      function applyAgentData() {
        chatTitle.textContent = agentData.agentName || "SiteMind AI";
        chatHeader.style.background = agentData.themeColor || "#2563eb";
        chatSend.style.background = agentData.themeColor || "#2563eb";
      }

      async function fetchAgentConfig() {
        try {
          var res = await fetch(
            API_BASE + "?action=agent-config&agentId=" + encodeURIComponent(agentId)
          );

          if (!res.ok) return;

          var data = await res.json();
          if (!data) return;

          agentData.agentId = data.agentId || agentId;
          agentData.agentName = data.agentName || "SiteMind AI";
          agentData.welcomeMessage = data.welcomeMessage || "";
          agentData.themeColor = data.themeColor || "#2563eb";

          applyAgentData();
        } catch (e) {}
      }

      async function sendMessageToApi(userMessage) {
        var history = normalizeHistory(getStoredHistory());

        if (activeController) {
          try {
            activeController.abort();
          } catch (e) {}
        }

        activeController = new AbortController();

        var timeoutId = setTimeout(function () {
          try {
            activeController.abort();
          } catch (e) {}
        }, REQUEST_TIMEOUT);

        try {
          var response = await fetch(API_BASE, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            signal: activeController.signal,
            body: JSON.stringify({
              action: "chat",
              agentId: agentId,
              message: userMessage,
              history: history,
              pageTitle: pageData.pageTitle,
              pageDescription: pageData.pageDescription,
              pageUrl: pageData.pageUrl,
              pageContext: pageData.pageContext
            })
          });

          var text = await response.text();
          var data = {};

         try {
  data = text ? JSON.parse(text) : {};
} catch (e) {
  throw new Error("Server nije vratio JSON: " + String(text || "").slice(0, 500));
}

          if (!response.ok) {
            throw new Error(
              data.details
                ? (typeof data.details === "string" ? data.details : JSON.stringify(data.details))
                : (data.error || "Greška servera.")
            );
          }

          if (!data.reply) {
            throw new Error("Nema odgovora.");
          }

          return String(data.reply).trim();
        } finally {
          clearTimeout(timeoutId);
          activeController = null;
        }
      }

      async function handleSubmit(event) {
        event.preventDefault();
        if (isSending) return;

        var userMessage = String(chatInput.value || "").trim();
        if (!userMessage) return;

        addMessage("user", userMessage);
        chatInput.value = "";
        autoResizeTextarea();
        setLoading(true);

        var placeholder = addMessage("assistant", "Razmišljam...");

        try {
          var answer = await sendMessageToApi(userMessage);

          updateMessage(placeholder, answer);

          var history = normalizeHistory(getStoredHistory());
          history.push({ role: "user", content: userMessage });
          history.push({ role: "assistant", content: answer });
          saveStoredHistory(history);
        } catch (error) {
          var msg = "Došlo je do greške. Pokušaj ponovno.";

          if (error && error.name === "AbortError") {
            msg = "Zahtjev je trajao predugo. Pokušaj s kraćim pitanjem.";
          } else if (error && error.message) {
            msg = error.message;
          }

          updateMessage(placeholder, msg);
        } finally {
          setLoading(false);
          chatInput.focus();
        }
      }

      window.addEventListener("message", function (event) {
        if (!event.data || typeof event.data !== "object") return;

        if (event.data.type === "sitemind-page-context") {
          pageData.pageTitle = String(event.data.pageTitle || "").slice(0, 300);
          pageData.pageDescription = String(event.data.pageDescription || "").slice(0, 500);
          pageData.pageUrl = String(event.data.pageUrl || "").slice(0, 500);
          pageData.pageContext = String(event.data.pageContext || "").slice(0, 5000);

          if (pageData.pageTitle) {
            chatSubtitle.textContent = "Ask Ai : " + pageData.pageTitle;
          }
        }

        if (event.data.type === "sitemind-agent-config") {
          agentData.agentId = event.data.agentId || agentId;
          agentData.agentName = event.data.agentName || "SiteMind AI";
          agentData.welcomeMessage = event.data.welcomeMessage || "";
          agentData.themeColor = event.data.themeColor || "#2563eb";
          applyAgentData();
        }
      });

      chatForm.addEventListener("submit", handleSubmit);

      chatInput.addEventListener("input", autoResizeTextarea);

      chatInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          handleSubmit(event);
        }
      });

      renderStoredHistory();
      applyAgentData();
      fetchAgentConfig().finally(function () {
        renderWelcomeIfNeeded();
      });

      if (window.parent && window.parent !== window) {
        try {
          window.parent.postMessage(
            {
              type: "sitemind-widget-ready",
              agentId: agentId
            },
            "*"
          );
        } catch (e) {}
      }
    })();
  </script>
</body>
</html>
