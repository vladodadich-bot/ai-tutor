<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteMind AI</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
      border-radius: 20px;
      overflow: hidden;
      background: #fff;
    }

    .header {
      padding: 14px 16px;
      background: linear-gradient(135deg, #0f172a, #2563eb);
      color: #fff;
      font-weight: 700;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .msg {
      max-width: 80%;
      padding: 10px 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      font-size: 14px;
      line-height: 1.4;
    }

    .user {
      margin-left: auto;
      background: #2563eb;
      color: #fff;
    }

    .bot {
      background: #e5e7eb;
      color: #111;
    }

    .inputbar {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ddd;
      gap: 8px;
      background: #fff;
    }

    textarea {
      flex: 1;
      resize: none;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      padding: 0 16px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header" id="chat-header">SiteMind AI</div>

    <div id="messages" class="messages">
   <div class="msg bot">Bok! Kako vam mogu pomoći?</div>
    </div>

    <div class="inputbar">
      <textarea id="input" placeholder="Upišite pitanje..."></textarea>
      <button id="sendBtn">Pošalji</button>
    </div>
  </div>
<script>
  let agentLoaded = false;
  const params = new URLSearchParams(window.location.search);
  const agentId = params.get("agentId") || "demo-agent";

  const messages = document.getElementById("messages");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  async function sendMessage(message) {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: message,
        agentId: agentId
      })
    });

    const text = await res.text();
    console.log("RAW API odgovor:", text);

    try {
      return JSON.parse(text);
    } catch (e) {
      return {
        error: "API nije vratio JSON",
        raw: text
      };
    }
  }

  sendBtn.addEventListener("click", async function () {
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    try {
      const data = await sendMessage(message);
if (!agentLoaded && data && data.agent) {
  const header = document.getElementById("chat-header");

  if (header) {
    header.textContent = data.agent.agentName;
  }

  if (data.agent.welcomeMessage) {
    addMessage(data.agent.welcomeMessage, "bot");
  }

  agentLoaded = true;
}
      if (data && data.answer) {
        addMessage(data.answer, "bot");
      } else if (data && data.error) {
        addMessage("API greška: " + data.error, "bot");
      } else {
        addMessage("Nema odgovora.", "bot");
      }
    } catch (err) {
      addMessage("Greška u komunikaciji.", "bot");
    }
  });

  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });
</script>
</body>
</html>
