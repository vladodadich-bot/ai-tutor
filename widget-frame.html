<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteMind AI</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
  margin: 0;
  font-family: Inter, system-ui, Arial;
  background: #0b0f19;
}

.wrap {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: linear-gradient(180deg, #0f172a, #020617);
  color: #fff;
}

.header {
  padding: 16px;
  font-weight: 600;
  font-size: 15px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.msg {
  max-width: 85%;
  padding: 12px 14px;
  border-radius: 16px;
  margin-bottom: 10px;
  font-size: 14px;
  line-height: 1.5;
}

.user {
  margin-left: auto;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: #fff;
  border-bottom-right-radius: 6px;
}

.bot {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.05);
  border-bottom-left-radius: 6px;
}

.inputbar {
  display: flex;
  padding: 12px;
  border-top: 1px solid rgba(255,255,255,0.08);
  gap: 8px;
  background: rgba(0,0,0,0.2);
}

textarea {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 14px;
}

textarea::placeholder {
  color: rgba(255,255,255,0.4);
}

button {
  padding: 0 16px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: #fff;
  font-weight: 600;
  cursor: pointer;
}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header" id="chat-header">SiteMind AI</div>
    <div id="messages" class="messages"></div>

    <div class="inputbar">
      <textarea id="input" placeholder="Type your message..."></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    let agentLoaded = false;
    let welcomeShown = false;

    const params = new URLSearchParams(window.location.search);
    const agentId = params.get("agentId") || "demo-agent";

    const messages = document.getElementById("messages");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const header = document.getElementById("chat-header");

    var pageContext = {
      pageUrl: "",
      pageTitle: "",
      pageDescription: "",
      pageText: "",
      lang: "en"
    };

    var uiText = {
      hr: {
        title: "SiteMind AI",
        welcome: "Bok! Kako vam mogu pomoći?",
        placeholder: "Upišite pitanje...",
        send: "Pošalji",
        typing: "AI razmišlja...",
        commError: "Greška u komunikaciji.",
        apiError: "API greška: ",
        noAnswer: "Nema odgovora."
      },
      en: {
        title: "SiteMind AI",
        welcome: "Hi! How can I help you?",
        placeholder: "Type your message...",
        send: "Send",
        typing: "AI is thinking...",
        commError: "Communication error.",
        apiError: "API error: ",
        noAnswer: "No answer."
      },
      de: {
        title: "SiteMind AI",
        welcome: "Hallo! Wie kann ich helfen?",
        placeholder: "Nachricht eingeben...",
        send: "Senden",
        typing: "KI denkt nach...",
        commError: "Kommunikationsfehler.",
        apiError: "API-Fehler: ",
        noAnswer: "Keine Antwort."
      }
    };

    function getLocale(lang) {
      if (lang === "hr") return uiText.hr;
      if (lang === "de") return uiText.de;
      return uiText.en;
    }

    function normalizeLang(lang) {
      const raw = (lang || "").toLowerCase();

      if (raw.indexOf("hr") === 0 || raw.indexOf("bs") === 0 || raw.indexOf("sr") === 0) {
        return "hr";
      }

      if (raw.indexOf("de") === 0) {
        return "de";
      }

      return "en";
    }

    function applyLanguageToUI() {
      pageContext.lang = normalizeLang(pageContext.lang);
      const t = getLocale(pageContext.lang);

      document.documentElement.lang = pageContext.lang;
      document.title = t.title;

      if (!agentLoaded) {
        header.textContent = t.title;
      }

      input.placeholder = t.placeholder;
      sendBtn.textContent = t.send;
    }

    function addMessage(text, type, extraClass) {
      const div = document.createElement("div");
      div.className = "msg " + type + (extraClass ? " " + extraClass : "");
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function showWelcomeIfNeeded() {
      if (welcomeShown) return;
      const t = getLocale(pageContext.lang);
      addMessage(t.welcome, "bot");
      welcomeShown = true;
    }

    window.addEventListener("message", function (event) {
      if (!event.data || event.data.type !== "sitemind_page_context") return;

      pageContext = event.data.payload || pageContext;
      pageContext.lang = normalizeLang(pageContext.lang);

      applyLanguageToUI();
      showWelcomeIfNeeded();
    });

    async function sendMessage(message) {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: message,
          agentId: agentId,
          pageContext: pageContext
        })
      });

      const text = await res.text();

      try {
        return JSON.parse(text);
      } catch (e) {
        return {
          error: "API did not return JSON",
          raw: text
        };
      }
    }

    async function handleSend() {
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, "user");
      input.value = "";
      input.style.height = "44px";

      const t = getLocale(pageContext.lang);
      const typingDiv = addMessage(t.typing, "bot", "typing");

      try {
        const data = await sendMessage(message);
        typingDiv.remove();

        if (data && data.agent && !agentLoaded) {
          if (data.agent.agentName) {
            header.textContent = data.agent.agentName;
          }
          agentLoaded = true;
        }

        if (data && data.answer) {
          addMessage(data.answer, "bot");
        } else if (data && data.error) {
          addMessage(t.apiError + data.error, "bot");
        } else {
          addMessage(t.noAnswer, "bot");
        }
      } catch (err) {
        typingDiv.remove();
        addMessage(t.commError, "bot");
      }
    }

    sendBtn.addEventListener("click", handleSend);

    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    input.addEventListener("input", function () {
      input.style.height = "44px";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    });

    applyLanguageToUI();
    showWelcomeIfNeeded();
  </script>
</body>
</html>
