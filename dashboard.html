<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteMind Dashboard</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 32px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .small {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 10px 12px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      background: #334155;
      color: #fff;
      font-size: 14px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .btn-danger {
      background: #ef4444;
      color: #fff;
    }

    .btn-copy {
      background: #10b981;
      color: #fff;
    }

    .agent-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .status {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1d4ed8;
      display: none;
      white-space: pre-wrap;
    }

    .status.error {
      background: #991b1b;
    }

    .status.success {
      background: #065f46;
    }

    .status.info {
      background: #1d4ed8;
    }

    .muted {
      opacity: 0.7;
      font-size: 13px;
    }

    .embed-box {
      margin-top: 10px;
      padding: 10px;
      background: #0f172a;
      border-radius: 8px;
      font-size: 12px;
      word-break: break-all;
      opacity: 0.9;
    }

    .backend-note {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #172554;
      font-size: 13px;
      line-height: 1.45;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 700px) {
      .row-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 SiteMind Dashboard</h1>

    <div class="backend-note">
      Trenutno ovaj dashboard koristi samo jedan backend endpoint:
      <strong>/api/index</strong> na Vercelu.
      Ako neka akcija još nije implementirana u <strong>index.js</strong>, dashboard će to prikazati kao poruku, a ne pucati.
    </div>

    <div id="status" class="status"></div>

    <div class="card">
      <h3>Create Agent</h3>
      <div class="muted">Create a new AI agent</div>

      <div class="row-2">
        <input id="name" placeholder="Agent name" />
        <input id="domain" placeholder="https://example.com" />
      </div>

      <div class="row-2">
        <input id="color" placeholder="#2563eb" />
        <input id="agentIdManual" placeholder="Optional existing agent ID for testing" />
      </div>

      <textarea id="welcome" placeholder="Welcome message"></textarea>

      <button class="btn-primary" id="createBtn">Create</button>
      <button class="btn-copy" id="copyManualBtn" type="button">Copy Embed from Manual Agent ID</button>
    </div>

    <div id="agents"></div>
  </div>

  <script>
    const API_BASE = "https://ai-tutor-rouge-theta.vercel.app/api/index";

    function showStatus(message, type) {
      const box = document.getElementById("status");
      box.textContent = message;
      box.className = "status " + (type || "info");
      box.style.display = "block";
    }

    function clearStatus() {
      const box = document.getElementById("status");
      box.style.display = "none";
      box.textContent = "";
      box.className = "status";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function apiGet(action, extraQuery) {
      const url = new URL(API_BASE);
      url.searchParams.set("action", action);

      if (extraQuery && typeof extraQuery === "object") {
        Object.keys(extraQuery).forEach(function(key) {
          if (extraQuery[key] !== undefined && extraQuery[key] !== null && extraQuery[key] !== "") {
            url.searchParams.set(key, extraQuery[key]);
          }
        });
      }

      const res = await fetch(url.toString(), {
        method: "GET"
      });

      const text = await res.text();
      let data = {};

      try {
        data = text ? JSON.parse(text) : {};
      } catch (e) {
        throw new Error("Server nije vratio JSON: " + String(text || "").slice(0, 300));
      }

      if (!res.ok) {
        throw new Error(data.error || "GET request failed");
      }

      return data;
    }

    async function apiPost(action, payload) {
      const res = await fetch(API_BASE, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(
          Object.assign(
            {
              action: action
            },
            payload || {}
          )
        )
      });

      const text = await res.text();
      let data = {};

      try {
        data = text ? JSON.parse(text) : {};
      } catch (e) {
        throw new Error("Server nije vratio JSON: " + String(text || "").slice(0, 300));
      }

      if (!res.ok) {
        throw new Error(data.error || "POST request failed");
      }

      return data;
    }

    function buildEmbedCode(agentId, themeColor) {
      const safeColor = themeColor || "#2563eb";

      return '<script src="https://ai-tutor-rouge-theta.vercel.app/sitemind-embed.js" data-agent-id="' +
        agentId +
        '" data-bubble-text="Chat" data-position="bottom-right" data-color="' +
        safeColor +
        '"><\/script>';
    }

    function renderAgents(agents) {
      const container = document.getElementById("agents");
      container.innerHTML = "";

      if (!Array.isArray(agents) || agents.length === 0) {
        const empty = document.createElement("div");
        empty.className = "card";
        empty.innerHTML = "<h3>No agents yet</h3><div class='muted'>Create your first agent above.</div>";
        container.appendChild(empty);
        return;
      }

      agents.forEach(function(agent) {
        const div = document.createElement("div");
        div.className = "card";

        const title = document.createElement("h3");
        title.textContent = agent.agent_name || agent.agentName || "Untitled agent";

        const small = document.createElement("div");
        small.className = "small";
        small.textContent =
          (agent.site_domain || agent.siteDomain || "") +
          ((agent.created_at || agent.createdAt) ? " • " + (agent.created_at || agent.createdAt) : "");

        const nameInput = document.createElement("input");
        nameInput.id = "name-" + agent.agent_id;
        nameInput.value = agent.agent_name || agent.agentName || "";

        const welcomeTextarea = document.createElement("textarea");
        welcomeTextarea.id = "welcome-" + agent.agent_id;
        welcomeTextarea.value = agent.welcome_message || agent.welcomeMessage || "";

        const colorInput = document.createElement("input");
        colorInput.id = "color-" + agent.agent_id;
        colorInput.value = agent.theme_color || agent.themeColor || "#2563eb";

        const actions = document.createElement("div");
        actions.className = "agent-actions";

        const saveBtn = document.createElement("button");
        saveBtn.className = "btn-primary";
        saveBtn.textContent = "Save";
        saveBtn.onclick = function() {
          updateAgent(agent.agent_id);
        };

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "btn-danger";
        deleteBtn.textContent = "Delete";
        deleteBtn.onclick = function() {
          deleteAgent(agent.agent_id);
        };

        const copyBtn = document.createElement("button");
        copyBtn.className = "btn-copy";
        copyBtn.textContent = "Copy Embed";
        copyBtn.onclick = function() {
          copyEmbed(agent.agent_id, colorInput.value.trim());
        };

        const crawlBtn = document.createElement("button");
        crawlBtn.className = "btn-primary";
        crawlBtn.textContent = "Crawl";
        crawlBtn.onclick = function() {
          crawlSite(agent.agent_id, agent.site_domain || agent.siteDomain || "");
        };

        const testConfigBtn = document.createElement("button");
        testConfigBtn.className = "btn-primary";
        testConfigBtn.textContent = "Test Config";
        testConfigBtn.onclick = async function() {
          try {
            clearStatus();
            const cfg = await apiGet("agent-config", { agentId: agent.agent_id });
            showStatus("agent-config radi za: " + (cfg.agentName || cfg.agentId), "success");
          } catch (err) {
            showStatus("Config test failed: " + err.message, "error");
          }
        };

        const embedBox = document.createElement("div");
        embedBox.className = "embed-box";
        embedBox.innerHTML = escapeHtml(buildEmbedCode(agent.agent_id, colorInput.value.trim()));

        actions.appendChild(saveBtn);
        actions.appendChild(deleteBtn);
        actions.appendChild(copyBtn);
        actions.appendChild(crawlBtn);
        actions.appendChild(testConfigBtn);

        div.appendChild(title);
        div.appendChild(small);
        div.appendChild(nameInput);
        div.appendChild(welcomeTextarea);
        div.appendChild(colorInput);
        div.appendChild(actions);
        div.appendChild(embedBox);

        container.appendChild(div);
      });
    }

    async function loadAgents() {
      try {
        clearStatus();

        const data = await apiPost("get-agents", {});

        if (Array.isArray(data)) {
          renderAgents(data);
          return;
        }

        if (Array.isArray(data.agents)) {
          renderAgents(data.agents);
          return;
        }

        renderAgents([]);
      } catch (err) {
        renderAgents([]);
        showStatus(
          "get-agents trenutno nije spreman u index.js ili vraća grešku.\n" +
          "Frontend je ispravno prebačen na /api/index.\n\n" +
          "Detalj: " + err.message,
          "error"
        );
      }
    }

    async function createAgent() {
      try {
        clearStatus();

        const btn = document.getElementById("createBtn");
        btn.disabled = true;
        btn.textContent = "Creating...";

        const name = document.getElementById("name").value.trim();
        const domain = document.getElementById("domain").value.trim();
        const color = document.getElementById("color").value.trim() || "#2563eb";
        const welcome = document.getElementById("welcome").value.trim();

        if (!name || !domain) {
          showStatus("Unesi barem agent name i site domain", "error");
          btn.disabled = false;
          btn.textContent = "Create";
          return;
        }

        const data = await apiPost("create-agent", {
          agentName: name,
          siteDomain: domain,
          themeColor: color,
          welcomeMessage: welcome,

          agent_name: name,
          site_domain: domain,
          theme_color: color,
          welcome_message: welcome
        });

        document.getElementById("name").value = "";
        document.getElementById("domain").value = "";
        document.getElementById("color").value = "";
        document.getElementById("welcome").value = "";

        showStatus(
          "Agent created successfully.\nAgent ID: " + (data.agentId || data.agent_id || "nije vraćen"),
          "success"
        );

        await loadAgents();

        btn.disabled = false;
        btn.textContent = "Create";
      } catch (err) {
        showStatus(
          "create-agent trenutno nije spreman u index.js ili vraća grešku.\n" +
          "Detalj: " + err.message,
          "error"
        );
        document.getElementById("createBtn").disabled = false;
        document.getElementById("createBtn").textContent = "Create";
      }
    }

    async function updateAgent(id) {
      try {
        clearStatus();

        const name = document.getElementById("name-" + id).value.trim();
        const welcome = document.getElementById("welcome-" + id).value.trim();
        const color = document.getElementById("color-" + id).value.trim();

        await apiPost("update-agent", {
          agentId: id,
          agentName: name,
          welcomeMessage: welcome,
          themeColor: color,

          agent_id: id,
          agent_name: name,
          welcome_message: welcome,
          theme_color: color
        });

        showStatus("Saved", "success");
      } catch (err) {
        showStatus(
          "update-agent trenutno nije spreman u index.js ili vraća grešku.\n" +
          "Detalj: " + err.message,
          "error"
        );
      }
    }

    async function deleteAgent(id) {
      try {
        clearStatus();

        if (!confirm("Delete agent?")) return;

        await apiPost("delete-agent", {
          agentId: id,
          agent_id: id
        });

        showStatus("Agent deleted", "success");
        await loadAgents();
      } catch (err) {
        showStatus(
          "delete-agent trenutno nije spreman u index.js ili vraća grešku.\n" +
          "Detalj: " + err.message,
          "error"
        );
      }
    }

    async function copyEmbed(id, color) {
      try {
        const code = buildEmbedCode(id, color);
        await navigator.clipboard.writeText(code);
        showStatus("Embed code copied", "success");
      } catch (err) {
        showStatus("Copy failed: " + err.message, "error");
      }
    }

    async function crawlSite(agentId, defaultUrl) {
      try {
        clearStatus();

        const url = prompt("Enter URL to crawl:", defaultUrl || "");
        if (!url) return;

        const data = await apiPost("crawl-site", {
          url: url,
          agentId: agentId,
          agent_id: agentId
        });

        showStatus(
          "Crawl success.\nPages crawled: " + (data.pagesCrawled || data.pages_crawled || "n/a"),
          "success"
        );
      } catch (err) {
        showStatus(
          "crawl-site trenutno nije spreman u index.js ili vraća grešku.\n" +
          "Detalj: " + err.message,
          "error"
        );
      }
    }

    async function copyManualEmbed() {
      try {
        clearStatus();

        const manualId = document.getElementById("agentIdManual").value.trim();
        const color = document.getElementById("color").value.trim() || "#2563eb";

        if (!manualId) {
          showStatus("Unesi postojeći agent ID za ručni embed.", "error");
          return;
        }

        const code = buildEmbedCode(manualId, color);
        await navigator.clipboard.writeText(code);
        showStatus("Manual embed code copied", "success");
      } catch (err) {
        showStatus("Copy failed: " + err.message, "error");
      }
    }

    document.getElementById("createBtn").addEventListener("click", createAgent);
    document.getElementById("copyManualBtn").addEventListener("click", copyManualEmbed);

    loadAgents();
  </script>
</body>
</html>
